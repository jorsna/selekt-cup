<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Gazzetta dello VCSO</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f5f0e8;
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
}

/* ── HEADER / MASTHEAD ── */
.masthead {
  background: #fff;
  border-bottom: 3px solid #1a1a1a;
  padding: 0;
}
.masthead-top {
  background: #1a1a1a;
  color: #f5f0e8;
  text-align: center;
  padding: 6px 20px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.masthead-title {
  font-family: 'UnifrakturMaguntia', cursive;
  font-size: clamp(36px, 8vw, 72px);
  color: #1a1a1a;
  text-align: center;
  padding: 16px 20px 8px;
  letter-spacing: 1px;
  line-height: 1;
}
.masthead-rule { height: 1px; background: #1a1a1a; margin: 0 20px; }
.masthead-rule-thick { height: 3px; background: #1a1a1a; margin: 4px 20px 0; }
.masthead-sub {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 20px 10px;
  font-size: 11px;
  color: #555;
  font-style: italic;
}
.masthead-motto {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 13px;
  color: #333;
  text-align: center;
}

/* ── PAGE ── */
.page {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 16px 60px;
}

/* ── LOADING / EMPTY ── */
.state-box {
  text-align: center;
  padding: 80px 20px;
  font-family: 'Playfair Display', serif;
}
.state-box .big { font-size: 48px; margin-bottom: 12px; }
.state-box p { font-size: 16px; color: #666; font-style: italic; }

/* ── ARTICLE ── */
.article-wrap {
  background: #fff;
  border: 1px solid #ddd;
  border-top: none;
  padding: 32px 32px 40px;
}

.edition-date {
  text-align: center;
  padding: 12px 0 16px;
  font-size: 12px;
  color: #888;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-bottom: 1px solid #ddd;
  margin-bottom: 28px;
}

.article-headline {
  font-family: 'Playfair Display', serif;
  font-size: clamp(26px, 5vw, 42px);
  font-weight: 900;
  line-height: 1.15;
  color: #1a1a1a;
  text-align: center;
  margin-bottom: 10px;
}
.article-deck {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-style: italic;
  color: #555;
  text-align: center;
  margin-bottom: 24px;
  line-height: 1.5;
}
.article-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 0 0 28px;
}
.article-divider::before,
.article-divider::after { content: ''; flex: 1; height: 1px; background: #157f4f; }
.article-divider-diamond { font-size: 10px; color: #157f4f; }

.article-body {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  line-height: 1.85;
  color: #1a1a1a;
  columns: 2;
  column-gap: 32px;
}
@media (max-width: 600px) {
  .article-body { columns: 1; }
  .article-wrap { padding: 20px 16px 28px; }
}

.article-body p { margin-bottom: 14px; }
.article-body p:first-of-type::first-letter {
  font-size: 52px;
  font-weight: 900;
  float: left;
  line-height: 0.85;
  margin: 4px 6px 0 0;
  color: #157f4f;
  font-family: 'Playfair Display', serif;
}

.article-kicker {
  text-align: center;
  font-family: 'Barlow', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #157f4f;
  margin-bottom: 10px;
}

.mvp-photo {
  float: left;
  width: 128px;
  margin: 2px 16px 8px 0;
  break-inside: avoid;
}
.mvp-photo .frame { display: block; border: 1px solid #1a1a1a; padding: 4px; background: #fff; }
.mvp-photo .duo {
  position: relative;
  aspect-ratio: 1 / 1.08;
  background: #1a1a1a;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.mvp-photo .duo img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); }
.mvp-photo .duo .init {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
  font-weight: 900;
  color: #157f4f;
}
.mvp-photo .cap {
  display: block;
  font-size: 10.5px;
  font-style: italic;
  color: #666;
  text-align: left;
  margin-top: 5px;
  line-height: 1.35;
}

.article-pull {
  column-span: all;
  border-top: 2px solid #157f4f;
  border-bottom: 2px solid #157f4f;
  padding: 14px 0 10px;
  margin: 20px 0;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-style: italic;
  font-weight: 700;
  color: #1a1a1a;
  text-align: center;
}
.article-pull-disclaimer {
  font-family: 'Barlow', sans-serif;
  font-size: 10px;
  font-style: normal;
  font-weight: 400;
  color: #999;
  margin-top: 6px;
  letter-spacing: 0.3px;
}

.stats-box {
  column-span: all;
  background: #f5f0e8;
  border: 1px solid #ddd;
  border-left: 4px solid #157f4f;
  padding: 16px 20px;
  margin: 20px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}
.stat-item { text-align: center; flex: 1; min-width: 80px; }
.stat-n {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 900;
  color: #1a1a1a;
  line-height: 1;
}
.stat-l { font-size: 10px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }

/* ── ADMIN PANEL ── */
.admin-bar {
  background: #1a1a1a;
  color: #f5f0e8;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.admin-badge {
  background: #c9a84c;
  color: #000;
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 2px;
  padding: 3px 10px;
  border-radius: 3px;
  text-transform: uppercase;
}
.admin-bar-label { font-size: 12px; color: #aaa; flex: 1; }
.admin-gen-btn {
  background: #c9a84c;
  color: #000;
  border: none;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 8px 20px;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
}
.admin-gen-btn:disabled { opacity: 0.5; cursor: default; }
.admin-gen-btn:hover:not(:disabled) { background: #f0c96e; }

/* ── LOGIN ── */
.login-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  padding: 20px;
}
.login-box {
  background: #1a1a1a;
  border: 1px solid #c9a84c;
  border-radius: 8px;
  padding: 28px 32px;
  width: 100%; max-width: 340px;
  text-align: center;
}
.login-box h2 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: #c9a84c;
  margin-bottom: 6px;
}
.login-box p { font-size: 12px; color: #888; margin-bottom: 18px; }
.login-box input {
  width: 100%; padding: 10px 14px;
  background: #0a0a0a; border: 1px solid #333;
  color: #fff; border-radius: 4px; font-size: 14px;
  margin-bottom: 10px; outline: none;
}
.login-box input:focus { border-color: #c9a84c; }
.login-box button {
  width: 100%; padding: 10px;
  background: #c9a84c; color: #000;
  border: none; border-radius: 4px;
  font-size: 13px; font-weight: 900;
  letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; margin-bottom: 8px;
}
.login-box .login-tilskuer {
  background: transparent; color: #888;
  border: 1px solid #333; margin-bottom: 0;
}
.login-box .login-tilskuer:hover { color: #aaa; border-color: #555; }
.login-err { font-size: 11px; color: #ef4444; min-height: 16px; margin-top: 4px; }

/* ── SPINNER ── */
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(201,168,76,0.3);
  border-top-color: #c9a84c;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.back-link {
  display: inline-block;
  margin: 16px 0 0;
  font-size: 11px;
  color: #888;
  text-decoration: none;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.back-link:hover { color: #555; }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay" class="login-overlay">
  <div class="login-box">
    <h2>La Gazzetta dello VCSO</h2>
    <p>Logg inn for å administrere, eller les som tilskuer</p>
    <input type="password" id="pw-input" placeholder="Adminpassord" onkeydown="if(event.key==='Enter')tryAdminLogin()">
    <div class="login-err" id="pw-err"></div>
    <button onclick="tryAdminLogin()">&#9997; Logg inn som admin</button>
    <button class="login-tilskuer" onclick="enterAsReader()">&#128065; Les som tilskuer</button>
  </div>
</div>

<!-- MASTHEAD -->
<div class="masthead">
  <div class="masthead-top">
    <span id="top-left">VCSO Selekt Cup 2026</span>
    <span>La Gazzetta dello VCSO</span>
    <span id="top-right">Mai &ndash; Juni 2026</span>
  </div>
  <div class="masthead-title">La Gazzetta dello VCSO</div>
  <div class="masthead-rule"></div>
  <div class="masthead-sub">
    <span id="edition-label">Laster...</span>
    <span class="masthead-motto">«Kamp, drama og biler»</span>
    <span id="edition-num">Daglig utgave</span>
  </div>
  <div class="masthead-rule-thick"></div>
</div>

<!-- ADMIN BAR (vises kun for admin) -->
<div id="admin-bar" class="admin-bar" style="display:none">
  <span class="admin-badge">Admin</span>
  <span class="admin-bar-label" id="admin-status">Ingen utgave generert i dag</span>
  <button class="admin-gen-btn" id="gen-btn" onclick="genererGazzetta()">&#9997; Generer dagens utgave</button>
</div>

<div class="page">
  <a href="index.html" class="back-link">&larr; Tilbake til appen</a>
  <div id="content"></div>
</div>

<script>
var SB_URL = 'https://resrjvztsqdxzqgiffeg.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlc3Jqdnp0c3FkeHpxZ2lmZmVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzg0MTMsImV4cCI6MjA5Mzc1NDQxM30.ouYcq-2hIUkqkn395Q5us5jYqa9JDVbOjJzORDBM72Y';
var ADMIN_PW = 'vcso-admin';
var SELGER_PW = 'selekt2026';


var isAdmin = false;

function sbH() {
  return {
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };
}

// ── INNLOGGING ───────────────────────────────────────────────────────
function tryAdminLogin() {
  var pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PW || pw === SELGER_PW) {
    isAdmin = (pw === ADMIN_PW);
    document.getElementById('login-overlay').style.display = 'none';
    if (isAdmin) document.getElementById('admin-bar').style.display = 'flex';
    localStorage.setItem('gaz-role', isAdmin ? 'admin' : 'selger');
    loadGazzetta();
  } else {
    var e = document.getElementById('pw-err');
    e.textContent = 'Feil passord';
    setTimeout(function(){ e.textContent = ''; }, 2500);
    document.getElementById('pw-input').value = '';
  }
}

function enterAsReader() {
  document.getElementById('login-overlay').style.display = 'none';
  localStorage.setItem('gaz-role', 'tilskuer');
  loadGazzetta();
}

// ── DATO-HJELP ───────────────────────────────────────────────────────
function idag() {
  var d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function igar() {
  var d = new Date(); d.setDate(d.getDate()-1);
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function pad(n) { return n < 10 ? '0'+n : String(n); }

function norskDato(dateStr) {
  var dager = ['søndag','mandag','tirsdag','onsdag','torsdag','fredag','lørdag'];
  var mnd = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
  var d = new Date(dateStr);
  return dager[d.getDay()] + ' ' + d.getDate() + '. ' + mnd[d.getMonth()] + ' ' + d.getFullYear();
}

// ── LAST GAZZETTA ────────────────────────────────────────────────────
function loadGazzetta() {
  var dato = idag();
  document.getElementById('edition-label').textContent = norskDato(dato);

  // Hent nyeste artikkel (ikke nødvendigvis dagens dato)
  fetch(SB_URL + '/rest/v1/selekt_gazzetta?order=created_at.desc&limit=1', { headers: sbH() })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (Array.isArray(data) && data.length > 0) {
        visTekst(data[0]);
        if (isAdmin) {
          document.getElementById('admin-status').textContent = 'Siste utgave: ' + norskDato(data[0].dato) + '. Generer ny for i dag?';
          document.getElementById('gen-btn').textContent = '✎ Generer dagens utgave';
        }
      } else {
        visIngen();
        if (isAdmin) {
          document.getElementById('admin-status').textContent = 'Ingen utgave generert ennå. Generer nå:';
        }
      }
    })
    .catch(function(err) {
      visIngen();
      console.error(err);
    });
}

function visIngen() {
  var content = document.getElementById('content');
  content.innerHTML = '<div class="state-box">'
    + '<div class="big">📰</div>'
    + '<p>Ingen utgave er publisert ennå for i dag.</p>'
    + (isAdmin ? '<p style="margin-top:8px;font-size:13px;color:#999">Trykk «Generer dagens utgave» i den svarte linjen øverst.</p>' : '<p style="margin-top:8px;font-size:13px;color:#999">Kom tilbake senere – redaksjonen er i arbeid.</p>')
    + '</div>';
}

function visTekst(row) {
  var content = document.getElementById('content');
  // Splitt artikkelinnhold på avsnitt
  var tekst = row.tekst || '';
  var avsnitt = tekst.split('\n\n').filter(function(a){ return a.trim(); });

  var stats = row.stats ? (typeof row.stats === 'string' ? JSON.parse(row.stats) : row.stats) : null;

  var statsHtml = '';
  if (stats) {
    statsHtml = '<div class="stats-box">'
      + (stats.totalt ? '<div class="stat-item"><div class="stat-n">'+stats.totalt+'</div><div class="stat-l">Salg totalt i VCSO i går</div></div>' : '')
      + (stats.mvp ? '<div class="stat-item"><div class="stat-n" style="font-size:18px">'+stats.mvp+'</div><div class="stat-l">MVP</div></div>' : '')
      + (stats.topAvd ? '<div class="stat-item"><div class="stat-n" style="font-size:18px">'+stats.topAvd+'</div><div class="stat-l">Ledende avd.</div></div>' : '')
      + (stats.hatTrick ? '<div class="stat-item"><div class="stat-n">⭐</div><div class="stat-l">Hat-trick</div></div>' : '')
      + '</div>';
  }

  var photoHtml = (stats && stats.mvpNavn) ? mvpFotoHtml(stats.mvpNavn, stats.mvpAvd) : '';

  var avsnittsHtml = avsnitt.map(function(a, i) {
    if (a.startsWith('«') || a.startsWith('"')) {
      return '<div class="article-pull">'+a+'<div class="article-pull-disclaimer">(Sitat generert etter beste evne basert på resultater av AI)</div></div>';
    }
    return '<p>'+a+'</p>';
  }).join('');

  // Sett inn stats etter andre avsnitt
  if (avsnitt.length > 2) {
    var deler = avsnitt.map(function(a, i) {
      if (a.startsWith('«') || a.startsWith('"')) return '<div class="article-pull">'+a+'<div class="article-pull-disclaimer">(Sitat generert etter beste evne basert på resultater av AI)</div></div>';
      return '<p>'+a+'</p>';
    });
    deler.splice(2, 0, statsHtml);
    avsnittsHtml = deler.join('');
  }

  content.innerHTML = '<div class="article-wrap">'
    + '<div class="edition-date">Omhandler ' + norskDato(row.dato) + ' &nbsp;·&nbsp; Publisert av redaksjonen</div>'
    + '<div class="article-kicker">'+GZ_KICKER+'</div>'
    + '<h1 class="article-headline">'+escHtml(row.overskrift || 'Dagens utgave')+'</h1>'
    + (row.ingress ? '<p class="article-deck">'+escHtml(row.ingress)+'</p>' : '')
    + '<div class="article-divider"><span class="article-divider-diamond">◆</span></div>'
    + '<div class="article-body">'+photoHtml+avsnittsHtml+'</div>'
    + '</div>';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var GZ_KICKER = 'Selekt Cup';

function gzSlug(navn) {
  return String(navn).toLowerCase()
    .replace(/\s+/g, '_')
    .replace(/\u00e6/g, 'ae').replace(/\u00f8/g, 'o').replace(/\u00e5/g, 'aa')
    .replace(/[^a-z0-9_]/g, '');
}
function gzInitials(navn) {
  return String(navn).split(' ').map(function(x){ return x[0]||''; }).join('').slice(0,2).toUpperCase();
}
function mvpFotoHtml(navn, avd) {
  if (!navn) return '';
  var id = gzSlug(navn);
  var cap = 'MVP: ' + escHtml(navn) + (avd ? ', ' + escHtml(avd) : '');
  return '<span class="mvp-photo"><span class="frame"><span class="duo">'
    + '<span class="init">' + gzInitials(navn) + '</span>'
    + '<img src="photos/' + id + '.jpg" alt="" onerror="this.remove()">'
    + '</span></span><span class="cap">' + cap + '</span></span>';
}

// ── GENERER (ADMIN) ──────────────────────────────────────────────────
function genererGazzetta() {
  var btn = document.getElementById('gen-btn');
  var statusEl = document.getElementById('admin-status');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Henter data...';

  // Hent gårsdagens salg fra Supabase
  var igaar = igar();

  fetch(SB_URL + '/rest/v1/selekt_sales?select=*&deleted=eq.false&order=ts.asc', { headers: sbH() })
    .then(function(r) { return r.json(); })
    .then(function(allSalg) {
      if (!Array.isArray(allSalg)) allSalg = [];
      var salg = allSalg.filter(function(s) {
        if (!s.ts) return false;
        var d = new Date(s.ts);
        var norskDatoStr = d.toLocaleDateString('sv-SE', {timeZone: 'Europe/Oslo'});
        return norskDatoStr === igaar;
      });
      console.log('Salg hentet for ' + igaar + ':', salg.length, salg.map(function(s){ return s.selger + ' ' + s.modell; }));
      btn.innerHTML = '<span class="spinner"></span>Skriver artikkel...';
      statusEl.textContent = 'Henter salgsdata og sender til AI...';
      return fetch(SB_URL + '/rest/v1/selekt_gazzetta?order=created_at.desc&limit=1', { headers: sbH() })
        .then(function(r){ return r.json(); })
        .then(function(prev){
          var forrige = (Array.isArray(prev) && prev[0]) ? prev[0] : null;
          return genererTekst(salg, igaar, allSalg, forrige);
        });
    })
    .then(function(resultat) {
      // Lagre i Supabase
      var row = {
        dato: igaar,
        overskrift: resultat.overskrift,
        ingress: resultat.ingress,
        tekst: resultat.tekst,
        stats: resultat.stats
      };
      console.log('Sender til Supabase:', JSON.stringify(row));
      return fetch(SB_URL + '/rest/v1/selekt_gazzetta', {
        method: 'POST',
        headers: sbH(),
        body: JSON.stringify(row)
      }).then(function(r) {
        if (!r.ok) return r.text().then(function(txt) {
          throw new Error('Lagring feilet ' + r.status + ': ' + txt);
        });
        return row;
      });
    })
    .then(function(row) {
      btn.disabled = false;
      btn.innerHTML = '&#9997; Generer på nytt';
      statusEl.textContent = 'Publisert! Utgave for ' + norskDato(igaar) + ' er live.';
      visTekst(row);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.innerHTML = '&#9997; Generer dagens utgave';
      statusEl.textContent = 'Feil: ' + err.message;
      console.error(err);
      // Vis feilmelding i content
      document.getElementById('content').innerHTML = '<div class="state-box">'
        + '<div class="big">⚠️</div>'
        + '<p>'+err.message+'</p>'
        + '<p style="margin-top:8px;font-size:12px;color:#999">Sjekk at selekt_gazzetta-tabellen finnes i Supabase, og at API-nøkkelen er konfigurert.</p>'
        + '</div>';
    });
}

// ── AI-GENERERING ────────────────────────────────────────────────────
function genererTekst(salg, dato, alleSalg, forrige) {
  var totalt = salg.length;
  var selgerTelling = {}, avdTelling = {ryen:0,fornebu:0,lillestrom:0,okern:0}, modellTelling = {}, finTelling = 0, hatTrickNavn = [];

  salg.forEach(function(s) {
    selgerTelling[s.selger] = (selgerTelling[s.selger]||0) + 1;
    if (avdTelling[s.loc] !== undefined) avdTelling[s.loc]++;
    modellTelling[s.modell] = (modellTelling[s.modell]||0) + 1;
    if (s.finansiert) finTelling++;
  });

  Object.keys(selgerTelling).forEach(function(n){ if(selgerTelling[n]>=3) hatTrickNavn.push(n); });

  // Finn MVP med finansiering som tiebreaker
  var maxSalg = Math.max.apply(null, Object.values(selgerTelling).concat([0]));
  var toppSelgere = Object.keys(selgerTelling).filter(function(n){ return selgerTelling[n]===maxSalg; });

  // Tell finansiering per selger denne dagen
  var finPerSelger = {};
  salg.forEach(function(s){ if(s.finansiert) finPerSelger[s.selger] = (finPerSelger[s.selger]||0)+1; });

  var mvpListe;
  var varTiebreak = false;
  if (toppSelgere.length > 1) {
    var maxFin = Math.max.apply(null, toppSelgere.map(function(n){ return finPerSelger[n]||0; }));
    var etterTiebreak = toppSelgere.filter(function(n){ return (finPerSelger[n]||0) === maxFin; });
    if (etterTiebreak.length < toppSelgere.length) {
      mvpListe = etterTiebreak; // finansiering skilte
      varTiebreak = true;
    } else {
      mvpListe = toppSelgere; // fortsatt likt – ekte delt MVP
    }
  } else {
    mvpListe = toppSelgere;
  }

  // Margin til nærmeste rival (for proporsjonal dramatikk)
  var alleSalgstall = Object.keys(selgerTelling).map(function(n){ return selgerTelling[n]; }).sort(function(a,b){ return b-a; });
  var nestBeste = 0;
  for (var iM=0; iM<alleSalgstall.length; iM++){ if(alleSalgstall[iM] < maxSalg){ nestBeste = alleSalgstall[iM]; break; } }
  var forsprang = maxSalg - nestBeste;
  var topAvd = Object.keys(avdTelling).sort(function(a,b){ return avdTelling[b]-avdTelling[a]; })[0] || null;
  var topModell = Object.keys(modellTelling).sort(function(a,b){ return modellTelling[b]-modellTelling[a]; })[0] || null;
  var avdNavn = {ryen:'Ryen',fornebu:'Fornebu',lillestrom:'Lillestrøm',okern:'Økern'};

  // Totalsesongen
  var totalSesongen = (alleSalg||[]).length;
  var totalAvd = {ryen:0,fornebu:0,lillestrom:0,okern:0};
  var totalSelger = {};
  (alleSalg||[]).forEach(function(s){
    if (totalAvd[s.loc]!==undefined) totalAvd[s.loc]++;
    totalSelger[s.selger] = (totalSelger[s.selger]||0)+1;
  });
  var totalLeder = Object.keys(totalSelger).sort(function(a,b){return totalSelger[b]-totalSelger[a];})[0]||null;

  var stats = {
    totalt: totalt,
    mvp: mvpListe.map(function(n){return n.split(' ')[0];}).join('/'),
    mvpNavn: mvpListe.length === 1 ? mvpListe[0] : null,
    mvpAvd: '',
    topAvd: topAvd ? avdNavn[topAvd] : null,
    hatTrick: hatTrickNavn.length > 0
  };

  if (totalt === 0) {
    return Promise.resolve({
      overskrift: 'En stille dag i ' + norskDato(dato).split(' ').slice(0,2).join(' '),
      ingress: 'Ingen biler byttet hender ' + norskDato(dato) + '. Hvilerdag – eller stormens øye?',
      tekst: 'Det er dager i bruktbilenes verden der stillheten taler høyere enn noe salg noensinne kunne gjort. ' + norskDato(dato) + ' var en slik dag.\n\nIngen scoringer ble registrert. Selgerne ladet batteriene, studerte markedet og forberedte seg på dagene som kommer. La Gazzetta noterer med respekt fraværet av tall – og ser frem til morgendagens kamp med forventning.\n\n«Stormen som ikke kom, varsler alltid en større storm.»\n\nRedaksjonen holder øye med gresset og venter.',
      stats: stats
    });
  }

  var SELGER_AVD = {
    'Brian Kalvatn':'Ryen','Joakim Rønneberg':'Ryen','Fabian Noraker':'Ryen',
    'Marius Skaugård':'Fornebu','Vetle Brænd Rømo':'Fornebu','Martin Ekmo':'Fornebu',
    'Jonas Bakken':'Lillestrøm','Sebastian Wang':'Lillestrøm','Adrian Kjærstad Lund':'Lillestrøm',
    'Jørgen Heggedal':'Økern','Britt Robertsen':'Økern'
  };

  stats.mvpAvd = stats.mvpNavn ? (SELGER_AVD[stats.mvpNavn] || '') : '';

  var selgerListe = Object.keys(selgerTelling).sort(function(a,b){return selgerTelling[b]-selgerTelling[a];}).map(function(n){
    var avd = SELGER_AVD[n]||'ukjent';
    var fin = salg.filter(function(s){return s.selger===n&&s.finansiert;}).length;
    return '- '+n+' ('+avd+'): '+selgerTelling[n]+' bil'+(selgerTelling[n]>1?'er':'')+( fin>0?' inkl. '+fin+' finansiert':'');
  }).join('\n');

  var mvpTekst = mvpListe.length > 1
    ? 'DELT MVP: ' + mvpListe.map(function(n){return n+' ('+(SELGER_AVD[n]||'ukjent')+', '+selgerTelling[n]+' salg, '+(finPerSelger[n]||0)+' finansiert)';}).join(' og ')
    : 'MVP: ' + mvpListe[0] + ' (' + (SELGER_AVD[mvpListe[0]]||'ukjent') + ') med ' + maxSalg + ' salg og ' + (finPerSelger[mvpListe[0]]||0) + ' finansiert' + (varTiebreak ? ' – vant på finansiering som tiebreaker' : '');

  // Proporsjonal dramatikk: fortell AI-en eksakt hvor stor seieren var
  var mvpFornavn = (mvpListe[0]||'').split(' ')[0];
  var marginInstruks;
  if (mvpListe.length > 1) {
    marginInstruks = 'DAGENS DUELL: ' + mvpListe.map(function(n){return n.split(' ')[0];}).join(' og ') + ' endte HELT likt – samme antall salg OG samme antall finansieringer. Ær dem som likeverdige mestere; ikke kår én vinner over den andre.';
  } else if (varTiebreak) {
    marginInstruks = 'DAGENS DUELL: ' + mvpFornavn + ' og minst én rival hadde NØYAKTIG like mange salg (' + maxSalg + '). ' + mvpFornavn + ' vant duellen UTELUKKENDE på finansiering – en hårfin, gladiatorisk seier avgjort på det aller fineste av marginer. RAM INN SLIK: «vant duellen på en finansiering». ALDRI som en knusende seier. Rivalen(e) var fullstendig jevnbyrdig(e) og fortjener respekt – skriv ALDRI at noen ble «knust», «herjet», «valset over» eller var «sjanseløse».';
  } else if (forsprang === 1) {
    marginInstruks = 'DAGENS MARGIN: ' + mvpFornavn + ' vant med ett enkelt salgs margin (' + maxSalg + ' mot ' + nestBeste + '). En tett, nervepirrende triumf – ram den inn som en knapp seier på målstreken, ALDRI som en utklassing. Ingen ble «knust».';
  } else {
    marginInstruks = 'DAGENS MARGIN: ' + mvpFornavn + ' ledet suverent med ' + maxSalg + ' salg, ' + forsprang + ' foran nærmeste rival (' + nestBeste + '). Her er stor, dominerende dramatikk fortjent.';
  }

  var hatTrickTekst = hatTrickNavn.map(function(n){return n+' ('+(SELGER_AVD[n]||'ukjent')+')';}).join(', ');

  var totalOppsummering = alleSalg && alleSalg.length > 0
    ? '\nSESONGTOTAL (til og med i går):\n- Totalt solgt hele sesongen: '+totalSesongen+' biler\n- Avdelinger totalt: Ryen '+totalAvd.ryen+', Fornebu '+totalAvd.fornebu+', Lillestrøm '+totalAvd.lillestrom+', Økern '+totalAvd.okern+'\n- Ledende selger totalt: '+(totalLeder||'ingen')+' ('+(totalSelger[totalLeder]||0)+' biler)' : '';

  var forrigeBlokk = (forrige && forrige.tekst)
    ? '\n\nGÅRSDAGENS UTGAVE (kun for kontinuitet – du kan bygge videre på løpende historier og rivalisering, men IKKE gjenta gårsdagens innhold):\nOverskrift: ' + forrige.overskrift + '\n' + forrige.tekst + '\n'
    : '';

  var seasonSlutt = '2026-06-30';
  var tidslinje = '';
  if (alleSalg && alleSalg.length) {
    var minTs = null;
    alleSalg.forEach(function(s){ if (s.ts && (minTs === null || s.ts < minTs)) minTs = s.ts; });
    if (minTs) {
      var fDato = new Date(minTs).toLocaleDateString('sv-SE', {timeZone:'Europe/Oslo'});
      var d0 = new Date(fDato + 'T00:00:00Z'), dN = new Date(dato + 'T00:00:00Z'), dE = new Date(seasonSlutt + 'T00:00:00Z');
      var dagISesong = Math.round((dN - d0) / 86400000) + 1;
      var dagerIgjen = Math.max(0, Math.round((dE - dN) / 86400000));
      tidslinje = '\n\nTIDSLINJE (bruk KUN disse tallene hvis du nevner tid – aldri regn ut eller finn på egne):\n- Utgaven dekker ' + norskDato(dato) + '\n- Dette er dag ' + dagISesong + ' av konkurransen (regnet fra første registrerte salg)\n- ' + dagerIgjen + ' dager igjen til sesongslutt 30. juni 2026';
    }
  }

  var prompt = 'Du er La Gazzetta dello VCSO – en dramatisk italiensk-inspirert sportsavis for VCSO Selekt Cup 2026, en konkurranse i salg av bruktbiler og lagerbiler hos Volvo Car Stor Oslo (VCSO).\n\nKAMPRAPPORT – ' + norskDato(dato) + '\n\nSALG PER SELGER DENNE DAGEN:\n' + selgerListe + '\n\nSAMMENDRAG DENNE DAGEN:\n- Totalt: ' + totalt + ' biler\n- ' + mvpTekst + '\n- Avdelinger: Ryen ' + avdTelling.ryen + ', Fornebu ' + avdTelling.fornebu + ', Lillestrøm ' + avdTelling.lillestrom + ', Økern ' + avdTelling.okern + '\n- Bestselger-modell: ' + (topModell||'ukjent') + ' (' + (modellTelling[topModell]||0) + ' stk)\n- Finansierte salg: ' + finTelling + '\n' + (hatTrickNavn.length?'- HAT-TRICK: '+hatTrickTekst+'\n':'') + totalOppsummering + tidslinje + forrigeBlokk + '\n\n' + marginInstruks + '\n\nVIKTIG: Bruk eksakt riktig avdeling per selger. Ikke finn på dag-tall, datoer eller hvor lenge konkurransen har pågått – bruk kun tidsfakta fra TIDSLINJE-seksjonen over, og hvis den mangler, ikke nevn tid i det hele tatt.\n\nINNRAMMING: Dette handler om SIGNERTE KONTRAKTER, ikke om biler som leveres eller fysisk forlater lokalet. Skriv ALDRI at biler «forlot», «rullet ut» eller «forsvant fra lageret» – skriv heller «signerte kontrakter», «sikret salget» eller «landet avtalen». Finansierte kontrakter er en TRIUMF og noe av det mest verdifulle en selger kan lande – løft dem alltid fram som en bragd, aldri nøytralt eller negativt.\n\nHVIS DET IKKE ER NOEN SALG DENNE DAGEN: ikke skriv en flau "ingenting skjedde"-artikkel. La heller redaksjonen dramatisere noe annet like episk – stillheten før stormen, stillingen i sesongen, jakten på tronen eller en hyllest til ledende avdeling. Du trenger ikke forklare at det ikke var salg.\n\nSkriv en EPISK og storslagen avisartikkel på NORSK, i den udødelige ånden til La Gazzetta dello Sport – operadramatisk, høytidelig og lidenskapelig, med sans for det heroiske og den italienske patosen. Tenk fotofinish på Giro-en, en duell i San Siro, en mester båret på gullstol gjennom gatene. Dette er ikke en nøktern rapport – det er en hyllest.\n\nSTEMME: Storslagen, lidenskapelig og begeistret, men alltid forankret i virkeligheten. Du løfter ekte tall og navn opp i det mytiske – du erstatter dem aldri med tåke. Hver setning skal bety noe konkret. Dramatikk er forsterkning av fakta, ikke flukt fra dem.\n\nPROPORSJONALITET (helt avgjørende): Intensiteten i språket MÅ matche marginen i DAGENS DUELL/MARGIN over. Et stort forsprang fortjener knusende ord. En seier avgjort på finansiering eller ett enkelt salg er en hårfin, gladiatorisk triumf – skriv den som et nervepirrende fotofinish, ALDRI som en massakre. Du skal ALDRI ydmyke den som tapte eller antyde at rivalene var sjanseløse – det dreper motivasjonen til alle som leser. Den beseirede rivalen er en verdig helt som falt med æren i behold.\n\nREGISTER: Vær breakneck og begeistret – korte, eksplosive setninger vekslet med lengre. Ett velplassert utropstegn er lov. Men energien skal komme fra konkrete tall og navn, aldri fra svulstig tåke.\n\nSPRÅK: Skriv feilfri norsk bokmål med korrekt rettskriving og tegnsetting. Ingen anglisismer, ingen slurvefeil. Les korrektur på deg selv før du svarer – dette skal fremstå som en profesjonell avis.\n\n1. OVERSKRIFT (maks 10 ord): Episk og slående, men MÅ inneholde minst ett konkret faktum – et navn, et tall eller en avdeling – slik at leseren umiddelbart skjønner hva som skjedde. Storhet kommer av å opphøye virkeligheten, ikke skjule den. GODE ved stort forsprang: «Kalvatn knuser alt: fire biler i Ryens navn», «Økern erobrer tronen mens Fornebu vakler». GODE ved knapp duell: «Kalvatn vinner gladiatorduellen på en finansiering», «Likeverdige til siste sekund – Kalvatn avgjør på målstreken». UNNGÅ (for gåtefulle): «Skjebnetimen slo til», «En dag for historiebøkene». UNNGÅ ved knapp margin: knusings-ord som «knuser», «herjer», «valser over», «sjanseløs».\n2. INGRESS (1 setning): Slå an den storslagne tonen, men nevn dagens hovedfaktum.\n3. BRØDTEKST: 5 avsnitt, ca 270 ord. Avsnitt skilles av \\n\\n.\n- FØRSTE AVSNITT: Si rett ut hva som faktisk skjedde – hvem solgte hva, og stillingen – før dramatikken tar over. En leser skal kunne gjengi dagens viktigste hendelse etter å ha lest overskrift + ingress + første avsnitt.\n- Inkluder ETT sitat i anførselstegn som sitt eget avsnitt (helst avsnitt 3). Tillegg sitatet til redaksjonen eller en rolle (f.eks. «en jublende avdelingsleder»), ikke til en navngitt person.\n- SISTE AVSNITT = kort sesongtotal-oppsummering.\n- UNNGÅ disse klisjeene fullstendig: «skjebnetime», «historiebøkene», «tidenes», «en dag for evigheten», «det legendariske», tomme superlativer og blandede metaforer. La de ekte resultatene bære dramatikken.\n\nEKSEMPEL på ønsket tone (IKKE kopier innholdet – bare lær balansen mellom drama og konkret klarhet):\nOverskrift: «Kalvatn herjer: fire biler sikrer Ryen tronen»\nIngress: «En vill tirsdag på Ryen – Brian Kalvatn leverte fire kontrakter alene og skjøt avdelingen forbi Fornebu på sesongtoppen.»\nAvsnitt 1: «Det startet rolig og endte i ekstase. Da klokken passerte 16, hadde Kalvatn signert sin fjerde kontrakt for dagen – nok til å løfte hele Ryen forbi Fornebu, 142 mot 138 poeng.»\n\nSvar KUN med gyldig JSON:\n{"overskrift":"...","ingress":"...","tekst":"avsnitt1\\n\\navsnitt2\\n\\n\\"Sitat\\"\\n\\navsnitt3\\n\\nSesongtotal-avsnitt"}';

  return fetch('https://resrjvztsqdxzqgiffeg.supabase.co/functions/v1/swift-api', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + SB_KEY
    },
    body: JSON.stringify({ prompt: prompt })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('AI-feil: ' + r.status + '. Sjekk Edge Function og secret i Supabase.');
    return r.json();
  })
  .then(function(data) {
    console.log('Edge Function svar:', JSON.stringify(data));
    // Sjekk om Anthropic er overbelastet
    if (data.type === 'error' && data.error && data.error.type === 'overloaded_error') {
      throw new Error('Anthropic er overbelastet akkurat nå. Vent 1-2 minutter og prøv igjen.');
    }
    var content = data.content || (data.data && data.data.content);
    var raw = content && content[0] ? content[0].text : null;
    if (!raw) throw new Error('Tomt svar fra AI. Full respons: ' + JSON.stringify(data));
    console.log('AI tekst:', raw);
    // Finn JSON-blokk i svaret
    var clean = raw;
    var jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (jsonMatch) clean = jsonMatch[0];
    else clean = raw.replace(/```json|```/g,'').trim();
    var parsed = JSON.parse(clean);
    if (!parsed.overskrift) throw new Error('Mangler overskrift. Svar: ' + clean);
    parsed.stats = stats;
    return parsed;
  });
}
