<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skriv nyhet · Selekt</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a1a0f;--card:#0f2014;--b1:#1e3d26;--txt:#e8f0e9;--muted:#5a8a65;--gold:#c9a84c}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:'Barlow',system-ui,sans-serif;min-height:100vh;display:flex;justify-content:center;padding:24px 16px}
.wrap{width:100%;max-width:460px}
h1{font-family:'Anton',sans-serif;color:var(--gold);font-size:25px;letter-spacing:.05em;margin:0 0 4px;display:flex;align-items:center;gap:9px}
.sub{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.14em;margin-bottom:22px}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:14px 0 6px;font-weight:700}
input,textarea,select{width:100%;background:#0a1410;border:1px solid var(--b1);border-radius:10px;color:var(--txt);font-family:inherit;font-size:15px;padding:11px 13px}
textarea{min-height:120px;resize:vertical;line-height:1.45}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold)}
.btn{width:100%;margin-top:18px;background:var(--gold);color:var(--bg);border:none;border-radius:100px;font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;padding:13px;cursor:pointer;letter-spacing:.02em}
.btn:disabled{opacity:.5;cursor:default}
.msg{margin-top:13px;font-size:13px;text-align:center;min-height:18px}
.ok{color:#5fd08a}.err{color:#e06a6a}
.card{background:var(--card);border:1px solid var(--b1);border-radius:16px;padding:22px}
.hidden{display:none}
.recent{margin-top:28px}
.recent h2{font-family:'Anton',sans-serif;color:var(--gold);font-size:15px;letter-spacing:.05em;margin:0 0 6px}
.nrow{border-top:1px solid var(--b1);padding:13px 0;display:flex;gap:11px;align-items:flex-start}
.nrow:first-of-type{border-top:none}
.ntag{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:100px;border:1px solid var(--gold);color:var(--gold);white-space:nowrap}
.nttl{font-weight:700;font-size:14px;line-height:1.3}
.ndt{font-size:10px;color:var(--muted);margin-top:2px}
.del{background:none;border:none;color:#e06a6a;cursor:pointer;font-size:12px;padding:4px;white-space:nowrap}
.hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <h1>📣 Skriv nyhet</h1>
  <div class="sub">Selekt · Nyheter fra Podium</div>

  <div id="gate" class="card">
    <label for="pass">Passord</label>
    <input id="pass" type="password" placeholder="••••••" autocomplete="off">
    <button class="btn" id="unlock">Lås opp</button>
    <div class="msg err" id="gate-msg"></div>
  </div>

  <div id="editor" class="hidden">
    <div class="card">
      <label for="tag">Type</label>
      <select id="tag"><option>Nyhet</option><option>Endring</option></select>
      <label for="title">Overskrift</label>
      <input id="title" maxlength="80" placeholder="F.eks. Sommerpausen nærmer seg">
      <label for="body">Tekst</label>
      <textarea id="body" maxlength="600" placeholder="Skriv nyheten her …"></textarea>
      <button class="btn" id="publish">Publiser</button>
      <div class="msg" id="msg"></div>
      <div class="hint">Publiseres kun på <b>Selekt</b>. Trykk 📣-ikonet i appen for å se nyhetene.</div>
    </div>
    <div class="recent">
      <h2>Siste nyheter (Selekt)</h2>
      <div id="list"></div>
    </div>
  </div>
</div>
<script>
var SB='https://resrjvztsqdxzqgiffeg.supabase.co/rest/v1/news';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlc3Jqdnp0c3FkeHpxZ2lmZmVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzg0MTMsImV4cCI6MjA5Mzc1NDQxM30.ouYcq-2hIUkqkn395Q5us5jYqa9JDVbOjJzORDBM72Y';
var PASS='Salamander2026!';
var COMP='selekt';
var MONTHS=['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
function H(){return{apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json'};}
function fmt(iso){try{var d=new Date(iso);return d.getDate()+'. '+MONTHS[d.getMonth()];}catch(e){return '';}}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function $(id){return document.getElementById(id);}

$('unlock').onclick=function(){
  if($('pass').value===PASS){
    $('gate').classList.add('hidden');
    $('editor').classList.remove('hidden');
    loadList();
  } else { $('gate-msg').textContent='Feil passord.'; }
};
$('pass').addEventListener('keydown',function(e){if(e.key==='Enter')$('unlock').click();});

$('publish').onclick=function(){
  var title=$('title').value.trim(), body=$('body').value.trim(), tag=$('tag').value, msg=$('msg');
  if(!title||!body){msg.className='msg err';msg.textContent='Fyll inn overskrift og tekst.';return;}
  var btn=$('publish'); btn.disabled=true; msg.className='msg'; msg.textContent='Publiserer …';
  fetch(SB,{method:'POST',headers:Object.assign(H(),{Prefer:'return=minimal'}),body:JSON.stringify({tag:tag,title:title,body:body,comp:COMP,popup:false})})
    .then(function(r){
      btn.disabled=false;
      if(r.ok){msg.className='msg ok';msg.textContent='Publisert på Selekt!';$('title').value='';$('body').value='';loadList();}
      else{msg.className='msg err';msg.textContent='Noe gikk galt ('+r.status+'). Prøv igjen.';}
    })
    .catch(function(){btn.disabled=false;msg.className='msg err';msg.textContent='Nettverksfeil. Prøv igjen.';});
};

function loadList(){
  fetch(SB+'?select=id,created_at,tag,title,body&comp=in.('+COMP+',begge)&order=created_at.desc&limit=20',{headers:H()})
    .then(function(r){return r.json();})
    .then(function(d){
      var el=$('list');
      if(!Array.isArray(d)||!d.length){el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:6px 0">Ingen nyheter ennå.</div>';return;}
      el.innerHTML=d.map(function(n){
        return '<div class="nrow"><span class="ntag">'+esc(n.tag)+'</span>'
          +'<div style="flex:1"><div class="nttl">'+esc(n.title)+'</div><div class="ndt">'+esc(fmt(n.created_at))+'</div></div>'
          +'<button class="del" data-id="'+n.id+'">Slett</button></div>';
      }).join('');
      Array.prototype.forEach.call(el.querySelectorAll('.del'),function(b){
        b.onclick=function(){
          if(!confirm('Slette denne nyheten?'))return;
          fetch(SB+'?id=eq.'+b.getAttribute('data-id'),{method:'DELETE',headers:H()}).then(function(){loadList();});
        };
      });
    }).catch(function(){});
}
</script>
</body>
</html>
