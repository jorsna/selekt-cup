<canvas id="particles"></canvas>

<script>
(function(){
  const c=document.getElementById('particles'),ctx=c.getContext('2d');
  let W,H,pts=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  const COLS=[[34,197,94],[201,168,76],[240,201,110],[134,239,172],[22,163,74]];
  for(let i=0;i<110;i++){
    const col=COLS[Math.floor(Math.random()*COLS.length)];
    pts.push({x:Math.random()*9999,y:Math.random()*9999,r:Math.random()*1.5+0.2,
      vx:(Math.random()-0.5)*0.2,vy:-(Math.random()*0.35+0.05),
      life:Math.random(),maxLife:Math.random()*0.6+0.4,col,drift:Math.random()*Math.PI*2,driftS:Math.random()*0.01+0.003});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.life+=0.0022;p.drift+=p.driftS;
      if(p.life>p.maxLife){p.life=0;p.x=Math.random()*W;p.y=H+10;}
      p.x+=p.vx+Math.sin(p.drift)*0.35;p.y+=p.vy;
      const t=p.life/p.maxLife,a=t<0.15?t/0.15:t>0.8?(1-t)/0.2:1;
      ctx.save();ctx.globalAlpha=a*0.45;ctx.fillStyle=`rgb(${p.col.join(',')})`;
      ctx.shadowBlur=10;ctx.shadowColor=`rgba(${p.col.join(',')},0.9)`;
      ctx.beginPath();ctx.arc(p.x%W,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

  if(m>6)return{year:y,month:6,label:"Juni",key:"juni",live:false};
  const ml={5:"mai",6:"juni"}[m]||"mai",ll={5:"Mai",6:"Juni"}[m]||"Mai";
  return{year:y,month:m,label:ll,key:ml,live:true};
}
function monthRange(year,month){
  return{start:new Date(Date.UTC(year,month-1,1,0,0,0)),end:new Date(Date.UTC(year,month,0,23,59,59,999))};
}
function rankSellers(sales){
  const m={};
  sales.forEach(x=>{
    if(!m[x.selger])m[x.selger]={salg:0,finansiert:0,loc:x.loc,firstTs:x.ts};
    m[x.selger].salg++;if(x.finansiert)m[x.selger].finansiert++;
    if(x.ts<m[x.selger].firstTs)m[x.selger].firstTs=x.ts;
  });
  return Object.entries(m).map(([name,d])=>({name,...d}))
    .sort((a,b)=>b.salg-a.salg||b.finansiert-a.finansiert||a.firstTs.localeCompare(b.firstTs));
}
function rankDepts(sales){
  const d={};sales.forEach(s=>{if(s.loc)d[s.loc]=(d[s.loc]||0)+1;});
  return Object.entries(d).map(([loc,salg])=>({loc,salg,finansiert:sales.filter(s=>s.loc===loc&&s.finansiert).length}))
    .sort((a,b)=>b.salg-a.salg||b.finansiert-a.finansiert);
}
function AnimNum({value,color,suffix=""}){
  const[n,setN]=useState(0);
  useEffect(()=>{
    if(!value)return;let start=null;
    function step(ts){if(!start)start=ts;const p=Math.min((ts-start)/1100,1),e=1-Math.pow(1-p,4);setN(Math.round(e*value));if(p<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);
  },[value]);
  return <span style={{color}}>{n}{suffix}</span>;
}
function SmallAvatar({name,loc,size=38}){
  const photo=getPhoto(name);
  const init=name.split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase();const col=dc(loc);
  return(
    <div style={{width:size,height:size,borderRadius:'50%',overflow:'hidden',border:'1.5px solid '+col+'66',flexShrink:0,
      background:DEPT[loc]?.bg||'rgba(232,0,26,0.1)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 12px '+col+'33'}}>
      {photo?<img src={photo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt={name}/>
        :<span style={{fontFamily:"'Playfair Display',serif",fontSize:size*0.34,fontWeight:700,color:col}}>{init}</span>}
    </div>
  );
}
function PitchLines(){
  return(
    <svg className="pitch-lines" viewBox="0 0 488 460" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <g stroke="rgba(255,255,255,0.07)" strokeWidth="1.5" fill="none">
        <rect x="16" y="12" width="456" height="436" rx="4"/>
        <line x1="16" y1="230" x2="472" y2="230"/>
        <circle cx="244" cy="230" r="52"/>
        <circle cx="244" cy="230" r="3" fill="rgba(255,255,255,0.12)" stroke="none"/>
        <rect x="144" y="12" width="200" height="80"/><rect x="194" y="12" width="100" height="36"/>
        <rect x="144" y="368" width="200" height="80"/><rect x="194" y="424" width="100" height="24"/>
        <path d="M16,12 Q28,12 28,24"/><path d="M472,12 Q460,12 460,24"/>
        <path d="M16,448 Q28,448 28,436"/><path d="M472,448 Q460,448 460,436"/>
      </g>
    </svg>
  );
}
function PlayerTile({player,rank,delay}){
  const photo=getPhoto(player.name);
  const init=player.name.split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase();
  const col=dc(player.loc);const isTop=rank===1;
  return(
    <div className="player-tile" style={{animationDelay:`${delay}s`}}>
      <div className="player-photo-ring" style={{"--ring-color":col,"--ring-shadow":`0 0 16px ${col}66`}}>
        {photo?<img src={photo} alt={player.name}/>:<span className="initials">{init}</span>}
        <div className="player-rank-badge">{rank}</div>
      </div>
      <div className="player-nameplate">
        <div className="player-nameplate-name">{player.name.split(" ")[0]} {player.name.split(" ").slice(-1)[0]}</div>
        <div className="player-nameplate-dept" style={{color:col+'cc'}}>{dl(player.loc)}</div>
        <div className="player-nameplate-stats">
          <div style={{textAlign:'center'}}>
            <div className="player-stat-chip" style={{color:isTop?col:'rgba(255,255,255,0.75)',background:isTop?`${col}18`:'rgba(255,255,255,0.06)'}}>{player.salg}</div>
            <div className="player-stat-label">BILER</div>
          </div>
          {player.finansiert>0&&(
            <div style={{textAlign:'center'}}>
              <div className="player-stat-chip" style={{color:'#f0c96e',background:'rgba(240,201,110,0.1)'}}>{player.finansiert}</div>
              <div className="player-stat-label">FIN</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
function PitchFormation({ranked}){
  const top5=ranked.slice(0,5);if(!top5.length)return null;
  const rows=[[top5[0]],[top5[1],top5[2]].filter(Boolean),[top5[3],top5[4]].filter(Boolean)].filter(r=>r.length>0);
  return(
    <div className="pitch-wrap r4">
      <div className="pitch-header">
        <div className="pitch-badge">👕</div>
        <div><div className="pitch-title">Team of the Month</div><div className="pitch-sub">Formasjon 1 – 2 – 2</div></div>
      </div>
      <div className="pitch">
        <PitchLines/>
        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 70% 50% at 50% 50%,rgba(34,197,94,0.05),transparent 70%)',pointerEvents:'none'}}/>
        <div className="pitch-formation">
          {rows.map((row,ri)=>(
            <div key={ri} className="pitch-row">
              {row.map((player,pi)=>{
                const idx=rows.slice(0,ri).reduce((a,r)=>a+r.length,0)+pi;
                return <PlayerTile key={player.name} player={player} rank={idx+1} delay={0.5+idx*0.15}/>;
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
function Ticker({ranked,month,bestDept}){
  const items=ranked.slice(0,5).map((r,i)=>`${i+1}. ${r.name} · ${r.salg} biler`).join("   ✦   ");
  const full=`✦ TEAM OF THE MONTH · ${month.toUpperCase()} · VCSO SELEKT CUP 2026 ✦   ${bestDept?`🏆 FORHANDLER: ${dl(bestDept.loc)}   ✦   `:""}${items}   `;
  return(<div className="ticker-wrap"><div className="ticker-inner"><span className="ticker-chunk">{full}</span><span className="ticker-chunk">{full}</span></div></div>);
}
function ForhandlerCard({depts,monthKey}){
  if(!depts.length)return null;
  const best=depts[0];const col=dc(best.loc);
  const goal=GOALS[monthKey]?.[best.loc]||0;const pct=goal?Math.round((best.salg/goal)*100):0;
  return(
    <div className="fotm-wrap r2">
      <div className="fotm-card">
        <div style={{position:'absolute',inset:0,background:`radial-gradient(ellipse 80% 60% at 50% 0%,${col}0a,transparent 60%)`,pointerEvents:'none'}}/>
        <span className="fotm-trophy">🏆</span>
        <div className="fotm-eyebrow">Forhandler of the Month</div>
        <div className="fotm-name gold-text">{dl(best.loc)}</div>
        <div style={{textAlign:'center'}}>
          <span style={{display:'inline-flex',alignItems:'center',gap:8,background:DEPT[best.loc]?.bg,border:`1px solid ${col}44`,color:col,padding:'7px 20px',borderRadius:100,fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:'0.18em',fontWeight:600}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:col,boxShadow:`0 0 8px ${col}`,display:'inline-block'}}/>VCSO Selekt Cup 2026
          </span>
        </div>
        <div className="fotm-stats">
          {[{val:best.salg,lbl:'Biler solgt',col,delay:'0.5s'},{val:best.finansiert,lbl:'Finansiert',col:'#f0c96e',delay:'0.65s'},{val:pct,lbl:'Av mål',col:pct>=100?'#27c98a':col,delay:'0.8s',suffix:'%'}]
            .map(({val,lbl,col:c,delay,suffix},i)=>(
              <div key={i} className="fotm-stat" style={{animationDelay:delay}}>
                <div className="fotm-stat-num"><AnimNum value={val} color={c} suffix={suffix||""}/></div>
                <div className="fotm-stat-lbl">{lbl}</div>
              </div>
          ))}
        </div>
        {depts.length>1&&(
          <div style={{marginTop:24}}>
            <div className="rank-title">Avdelinger denne måneden</div>
            {depts.map((d,i)=>{const c=dc(d.loc);const g=GOALS[monthKey]?.[d.loc]||1;const p=Math.round(d.salg/g*100);return(
              <div key={d.loc} className="rank-row">
                <div className="rank-num" style={{color:i===0?'var(--gold2)':undefined}}>{i+1}</div>
                <div style={{width:34,height:34,borderRadius:'50%',background:DEPT[d.loc]?.bg,border:`1.5px solid ${c}55`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:8,fontWeight:700,color:c}}>{dl(d.loc).slice(0,2).toUpperCase()}</span>
                </div>
                <div style={{flex:1}}>
                  <div className="rank-name" style={{color:'rgba(255,255,255,0.85)'}}>{dl(d.loc)}</div>
                  <div className="rank-dept" style={{color:c+'99'}}>{d.salg} biler · {d.finansiert} fin</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div className="rank-pts" style={{color:c}}>{d.salg}</div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:'0.15em',color:'rgba(255,255,255,0.2)',marginTop:2}}>{p}% AV MÅL</div>
                </div>
              </div>
            );})}
          </div>
        )}
      </div>
    </div>
  );
}
function BesteSelgerCard({ranked}){
  if(!ranked.length)return null;
  const w=ranked[0];const col=dc(w.loc);
  return(
    <div className="sec r3">
      <div className="sec-top" style={{background:`linear-gradient(90deg,transparent,${col}88,transparent)`}}/>
      <div className="sec-title">⭐ Månedens beste selger</div>
      <div style={{display:'flex',alignItems:'center',gap:16}}>
        <SmallAvatar name={w.name} loc={w.loc} size={56}/>
        <div style={{flex:1}}><div className="sec-name">{w.name}</div><div className="sec-sub" style={{color:col}}>{dl(w.loc)}</div></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginTop:20}}>
        {[{val:w.salg,lbl:'Biler solgt',col},{val:w.finansiert,lbl:'Finansiert',col:'#f0c96e'},{val:w.salg*3,lbl:'Poeng',col:'#27c98a'}]
          .map(({val,lbl,col:c},i)=>(
          <div key={i} style={{background:'rgba(0,0,0,0.3)',borderRadius:14,padding:'16px 8px 12px',textAlign:'center',border:'1px solid rgba(255,255,255,0.04)',animation:`statPop 0.7s cubic-bezier(.16,1,.3,1) ${0.4+i*0.12}s both`}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:34,lineHeight:1,marginBottom:4}}><AnimNum value={val} color={c}/></div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:7,letterSpacing:'0.25em',textTransform:'uppercase',color:'rgba(255,255,255,0.2)'}}>{lbl}</div>
          </div>
        ))}
      </div>
    </div>
  );
}
function MaanedStats({sales,monthLabel}){
  const totSalg=sales.length,totFin=sales.filter(s=>s.finansiert).length;
  const finPct=totSalg?Math.round(totFin/totSalg*100):0;
  const activeDays=new Set(sales.map(s=>s.ts.slice(0,10))).size;
  return(
    <div className="r5">
      <div style={{margin:'0 16px 8px'}}><div className="rank-title">{monthLabel} — nøkkeltall</div></div>
      <div className="stats-bar">
        {[{val:totSalg,lbl:'Salg totalt',col:'var(--gold2)',delay:'0.6s'},{val:totFin,lbl:'Finansiert',col:'#f0c96e',delay:'0.72s'},{val:finPct,lbl:'Fin %',col:'#27c98a',delay:'0.84s',suffix:'%'},{val:activeDays,lbl:'Salgsdager',col:'#22c55e',delay:'0.96s'}]
          .map(({val,lbl,col,delay,suffix},i)=>(
          <div key={i} className="stat-tile" style={{animationDelay:delay}}>
            <div className="stat-tile-num"><AnimNum value={val} color={col} suffix={suffix||""}/></div>
            <div className="stat-tile-lbl">{lbl}</div>
          </div>
        ))}
      </div>
    </div>
  );
}
function App(){
  const[sales,setSales]=useState(null);const[error,setError]=useState(null);
  const dm=getDisplayMonth();
  useEffect(()=>{
    const{start,end}=monthRange(dm.year,dm.month);const fmt=d=>d.toISOString().replace('Z','');
    fetch(SB_URL+"/rest/v1/selekt_sales?select=*&ts=gte."+fmt(start)+"&ts=lte."+fmt(end)+"&deleted=is.false&order=ts.asc",
      {headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY}})
    .then(r=>r.ok?r.json():r.text().then(t=>{throw new Error(r.status+': '+t.slice(0,200));}))
    .then(setSales).catch(e=>setError(String(e)));
  },[]);
  if(error)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'#ef4444',fontFamily:'Rajdhani',padding:24,textAlign:'center'}}><div><div style={{fontSize:36,marginBottom:12}}>⚠️</div>Feil: {error}</div></div>;
  if(!sales)return<div className="loading"><div className="spin-ring"/><div className="loading-lbl">Laster inn månedstall...</div></div>;
  const ranked=rankSellers(sales),depts=rankDepts(sales),bestDept=depts[0]||null;
  return(
    <div>
      <div className="header rf">
        <div className="eyebrow">VCSO Selekt Cup · 2026</div>
        <div className="header-trophy">🏅</div>
        <div className="header-title gold-text">Team of the Month</div>
        <div className="header-sub">Månedsoversikt</div>
        <div className="month-badge"><div className="badge-dot"/>{dm.label} {dm.year}{dm.live&&<span style={{marginLeft:8,opacity:0.5,fontSize:9}}>· LIVE</span>}</div>
      </div>
      {sales.length===0?(
        <div style={{textAlign:'center',padding:'80px 24px',fontFamily:"'Playfair Display',serif",fontStyle:'italic',fontSize:18,color:'rgba(255,255,255,0.2)'}}>Ingen data for {dm.label}.</div>
      ):(
        <div className="content">
          <Ticker ranked={ranked} month={dm.label} bestDept={bestDept}/>
          <div className="spacer"/>
          <ForhandlerCard depts={depts} monthKey={dm.key}/>
          <BesteSelgerCard ranked={ranked}/>
          <PitchFormation ranked={ranked}/>
          <MaanedStats sales={sales} monthLabel={dm.label}/>
          <div className="footer r6"><div className="footer-line"/><div className="footer-txt">VCSO Selekt Cup 2026 · Mai – Juni · Team of the Month</div></div>
        </div>
      )}
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
