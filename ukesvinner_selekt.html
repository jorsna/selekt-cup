<style>

  --bg:#03080a; --green:#22c55e; --red:#e8001a; --blue:#3b82f6; --purple:#8b5cf6;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);font-family:'Rajdhani',sans-serif;color:#fff;overflow-x:hidden;}

#particles{position:fixed;inset:0;z-index:0;pointer-events:none;}

.bg-deep{
  position:fixed;inset:0;z-index:0;pointer-events:none;

    radial-gradient(ellipse 90% 90% at 85% 90%,rgba(34,197,94,0.05) 0%,transparent 55%),
    radial-gradient(ellipse 50% 50% at 50% 50%,rgba(201,168,76,0.04) 0%,transparent 65%),
    #03080a;
}
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(201,168,76,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.022) 1px,transparent 1px);
  background-size:70px 70px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 40%,black,transparent);

.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.04;

@keyframes shimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}
@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-14px) rotate(2deg);}}
@keyframes crownFloat{0%,100%{transform:translateY(0) scale(1) rotate(-4deg);filter:drop-shadow(0 0 24px rgba(201,168,76,0.6));}50%{transform:translateY(-18px) scale(1.07) rotate(4deg);filter:drop-shadow(0 0 50px rgba(201,168,76,1));}}
@keyframes revealUp{from{opacity:0;transform:translateY(70px) scale(0.94);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes revealFade{from{opacity:0;}to{opacity:1;}}
@keyframes scanDown{0%{top:-4px;opacity:1;}80%{opacity:1;}100%{top:100vh;opacity:0;}}
@keyframes tickerMove{from{transform:translateX(0);}to{transform:translateX(-50%);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes statPop{0%{transform:scale(0.6);opacity:0;}75%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}
@keyframes glowPulse{0%,100%{opacity:0.5;}50%{opacity:1;}}
@keyframes borderShimmer{0%{stroke-dashoffset:0;}100%{stroke-dashoffset:-1000;}}
@keyframes orbitSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes orbitSpinCCW{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}
@keyframes haloGlow{0%,100%{opacity:0.25;transform:scale(1);}50%{opacity:0.55;transform:scale(1.04);}}
@keyframes dotOrbit{from{transform:rotate(0deg) translateX(var(--r)) rotate(0deg);}to{transform:rotate(360deg) translateX(var(--r)) rotate(-360deg);}}
@keyframes dotOrbitCCW{from{transform:rotate(0deg) translateX(var(--r)) rotate(0deg);}to{transform:rotate(-360deg) translateX(var(--r)) rotate(360deg);}}
@keyframes countUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes lineDraw{from{stroke-dashoffset:2000;}to{stroke-dashoffset:0;}}

.r1{animation:revealUp 1s cubic-bezier(.16,1,.3,1) 0.08s both;}
.r2{animation:revealUp 1s cubic-bezier(.16,1,.3,1) 0.22s both;}
.r3{animation:revealUp 1s cubic-bezier(.16,1,.3,1) 0.38s both;}

<canvas id="particles"></canvas>

<div class="grain"></div>
<div class="scan"></div>

<script>
/* PARTICLE SYSTEM */
(function(){
  const c=document.getElementById('particles'),ctx=c.getContext('2d');
  let W,H,pts=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  resize();window.addEventListener('resize',resize);
  const COLS=[[201,168,76],[240,201,110],[255,233,130],[138,100,20]];
  for(let i=0;i<120;i++){
    const col=COLS[Math.floor(Math.random()*COLS.length)];
    pts.push({x:Math.random()*9999,y:Math.random()*9999,r:Math.random()*1.6+0.2,
      vx:(Math.random()-0.5)*0.22,vy:-(Math.random()*0.4+0.05),
      life:Math.random(),maxLife:Math.random()*0.6+0.4,col,
      drift:Math.random()*Math.PI*2,driftS:Math.random()*0.01+0.003});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.life+=0.0025;p.drift+=p.driftS;
      if(p.life>p.maxLife){p.life=0;p.x=Math.random()*W;p.y=H+10;}
      p.x+=p.vx+Math.sin(p.drift)*0.4;p.y+=p.vy;
      const t=p.life/p.maxLife,a=t<0.15?t/0.15:t>0.8?(1-t)/0.2:1;
      ctx.save();ctx.globalAlpha=a*0.65;
      ctx.fillStyle=`rgb(${p.col.join(',')})`;
      ctx.shadowBlur=12;ctx.shadowColor=`rgba(${p.col.join(',')},0.9)`;
      ctx.beginPath();ctx.arc(p.x%W,p.y,p.r,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

  const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=u.getUTCDay()||7;u.setUTCDate(u.getUTCDate()+4-day);
  const y1=new Date(Date.UTC(u.getUTCFullYear(),0,1));
  return Math.ceil((((u-y1)/86400000)+1)/7);
}
function weekDates(year,week){
  const jan4=new Date(Date.UTC(year,0,4));
  const w1s=new Date(jan4);w1s.setUTCDate(jan4.getUTCDate()-((jan4.getUTCDay()||7)-1));
  const s=new Date(w1s);s.setUTCDate(w1s.getUTCDate()+(week-1)*7);
  const e=new Date(s);e.setUTCDate(s.getUTCDate()+6);
  return{start:new Date(Date.UTC(s.getUTCFullYear(),s.getUTCMonth(),s.getUTCDate(),0,0,0)),
         end:  new Date(Date.UTC(e.getUTCFullYear(),e.getUTCMonth(),e.getUTCDate(),23,59,59,999))};
}
function getDisplayWeek(){
  const osloNow=new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Oslo"}));
  const d=new Date(osloNow);d.setDate(d.getDate()-7);
  return{year:d.getFullYear(),week:isoWeek(d)};
}
function fmtDate(d){return d.toLocaleDateString("no-NO",{day:"numeric",month:"long"});}

function rankSales(s){
  const m={};
  s.forEach(x=>{
    if(!m[x.selger])m[x.selger]={salg:0,finansiert:0,loc:x.loc,firstTs:x.ts};
    m[x.selger].salg++;if(x.finansiert)m[x.selger].finansiert++;
    if(x.ts<m[x.selger].firstTs)m[x.selger].firstTs=x.ts;
  });
  return Object.entries(m).map(([name,d])=>({name,...d,poeng:d.salg*3}))
    .sort((a,b)=>b.poeng-a.poeng||b.finansiert-a.finansiert||a.firstTs.localeCompare(b.firstTs));
}
function getMVPs(ws){
  const bd={};
  ws.forEach(s=>{const day=s.ts.slice(0,10);if(!bd[day])bd[day]={};bd[day][s.selger]=(bd[day][s.selger]||0)+1;});
  const days=Object.keys(bd).sort(),mc={};
  days.forEach(day=>{const ds=bd[day],max=Math.max(...Object.values(ds));Object.entries(ds).forEach(([n,c])=>{if(c===max)mc[n]=(mc[n]||0)+1;});});
  if(!Object.keys(mc).length)return[];
  const sorted=Object.entries(mc).sort((a,b)=>b[1]-a[1]),top=sorted[0][1];
  return sorted.filter(([,c])=>c===top).map(([name,count])=>{
    const mvpDays=days.map(day=>{const ds=bd[day],max=Math.max(...Object.values(ds));return ds[name]===max&&max>0;});
    return{name,count,loc:ws.find(s=>s.selger===name)?.loc||"",days,mvpDays};
  });
}
function getBestDept(ws){
  const ds={};ws.forEach(s=>{if(s.loc)ds[s.loc]=(ds[s.loc]||0)+1;});
  if(!Object.keys(ds).length)return null;
  const max=Math.max(...Object.values(ds));
  return{locs:Object.keys(ds).filter(k=>ds[k]===max),count:max};
}

/* Counting animation */
function AnimNum({value,color}){
  const[n,setN]=useState(0);
  useEffect(()=>{
    if(!value)return;let start=null;
    function step(ts){
      if(!start)start=ts;
      const p=Math.min((ts-start)/900,1),ease=1-Math.pow(1-p,4);
      setN(Math.round(ease*value));
      if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  },[value]);
  return <span style={{color}}>{n}</span>;
}

/* SVG ring avatar — perfectly centered always */
function AvatarHero({name,loc,size=130}){
  const id=nameToId(name);

  const init=name.split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase();
  const col=dc(loc);
  // SVG dimensions: give plenty of room for 3 rings
  const svgW=size+140, svgH=size+140;
  const cx=svgW/2, cy=svgH/2;
  const r1=size/2+12, r2=size/2+32, r3=size/2+52;
  const dashLen1=2*Math.PI*r1, dashLen2=2*Math.PI*r2, dashLen3=2*Math.PI*r3;

  return(
    <div className="avatar-stage" style={{height:svgH}}>
      {/* SVG rings – absolutely positioned, perfectly centered */}
      <svg className="avatar-svg" width={svgW} height={svgH} style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',pointerEvents:'none'}}>
        <defs>
          <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={col} stopOpacity="0.9"/>
            <stop offset="25%" stopColor="#f0c96e" stopOpacity="1"/>
            <stop offset="50%" stopColor={col} stopOpacity="0.5"/>
            <stop offset="75%" stopColor="#ffe98a" stopOpacity="1"/>
            <stop offset="100%" stopColor={col} stopOpacity="0.9"/>
          </linearGradient>
          <linearGradient id="rg2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stopColor={col} stopOpacity="0.4"/>
            <stop offset="50%" stopColor="#f0c96e" stopOpacity="0.6"/>
            <stop offset="100%" stopColor={col} stopOpacity="0.2"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow2">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        {/* Ring 3 – outermost dashed slow */}
        <g style={{transformOrigin:`${cx}px ${cy}px`,animation:'orbitSpinCCW 22s linear infinite'}}>
          <circle cx={cx} cy={cy} r={r3} fill="none" stroke={col} strokeWidth="1" strokeOpacity="0.18"
            strokeDasharray="4 18" />
          {/* 4 gems on ring 3 */}
          {[0,90,180,270].map(deg=>{
            const rad=deg*Math.PI/180;
            const gx=cx+r3*Math.cos(rad), gy=cy+r3*Math.sin(rad);
            return <circle key={deg} cx={gx} cy={gy} r="3" fill={col} fillOpacity="0.5"/>;
          })}
        </g>

        {/* Ring 2 – middle dashed medium */}
        <g style={{transformOrigin:`${cx}px ${cy}px`,animation:'orbitSpin 14s linear infinite'}}>
          <circle cx={cx} cy={cy} r={r2} fill="none" stroke="url(#rg2)" strokeWidth="1.5"
            strokeDasharray="6 12" filter="url(#glow)"/>
          {/* 3 glowing dots */}
          {[0,120,240].map(deg=>{
            const rad=deg*Math.PI/180;
            const gx=cx+r2*Math.cos(rad), gy=cy+r2*Math.sin(rad);
            return <circle key={deg} cx={gx} cy={gy} r="4" fill="#f0c96e" filter="url(#glow2)" fillOpacity="0.9"/>;
          })}
        </g>

        {/* Ring 1 – inner solid gold */}
        <g style={{transformOrigin:`${cx}px ${cy}px`,animation:'orbitSpinCCW 8s linear infinite'}}>
          <circle cx={cx} cy={cy} r={r1} fill="none" stroke="url(#rg1)" strokeWidth="2.5" filter="url(#glow)"/>
          {/* 2 bright gems */}
          {[45,225].map(deg=>{
            const rad=deg*Math.PI/180;
            const gx=cx+r1*Math.cos(rad), gy=cy+r1*Math.sin(rad);
            return <g key={deg}>
              <circle cx={gx} cy={gy} r="5.5" fill="#ffe98a" filter="url(#glow2)"/>
              <circle cx={gx} cy={gy} r="3" fill="#fff"/>
            </g>;
          })}
        </g>
      </svg>

      {/* Photo centered */}
      <div className="avatar-center" style={{width:size,height:size,position:'relative',zIndex:10}}>
        {photo
          ? <img src={photo} alt={name}/>
          : <div className="avatar-initials" style={{background:DEPT[loc]?.bg||"rgba(201,168,76,0.1)",color:col}}>{init}</div>
        }
      </div>
    </div>
  );
}

function App(){
  const[sales,setSales]=useState(null);
  const[error,setError]=useState(null);
  const lw=getDisplayWeek();

  useEffect(()=>{
    const{start,end}=weekDates(lw.year,lw.week);
    const fmt=d=>d.toISOString().replace('Z','');
    fetch(SB_URL+"/rest/v1/selekt_sales?select=*&ts=gte."+fmt(start)+"&ts=lte."+fmt(end)+"&deleted=eq.false&order=ts.asc",
      {headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY}})
    .then(r=>r.ok?r.json():Promise.reject(r.statusText))
    .then(setSales).catch(e=>setError(String(e)));
  },[]);

  if(error)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'#ef4444',fontFamily:'Rajdhani',padding:24,textAlign:'center'}}><div><div style={{fontSize:36,marginBottom:12}}>⚠️</div>Feil: {error}</div></div>;
  if(!sales)return<div className="loading"><div className="spin-ring"/><div className="loading-lbl">Laster inn resultater...</div></div>;

  const ranked=rankSales(sales);
  const winners=ranked.length?[ranked[0]]:[];
  const mvps=getMVPs(sales);
  const bestDept=getBestDept(sales);
  const htMap={};
  sales.forEach(s=>{const d=s.ts.slice(0,10);if(!htMap[s.selger])htMap[s.selger]={};htMap[s.selger][d]=(htMap[s.selger][d]||0)+1;});
  const hatters=Object.entries(htMap).filter(([,d])=>Object.values(d).some(c=>c>=3)).map(([name])=>({name,loc:sales.find(s=>s.selger===name)?.loc||""}));
  const mvpNames=new Set(mvps.map(m=>m.name));
  const trebleWinners=winners.filter(w=>mvpNames.has(w.name)&&bestDept?.locs.includes(w.loc));
  const{start,end}=weekDates(lw.year,lw.week);

  return(
    <div>
      {/* HEADER */}
      <div className="header rf">
        <div className="eyebrow">VCSO Selekt Cup · 2026</div>
        <div className="header-num gold-text">Uke {lw.week}</div>
        <div className="header-word">Ukesrecap</div>
        <div className="week-badge">
          <div className="badge-dot"/>
          {fmtDate(start)} – {fmtDate(end)}
        </div>
      </div>

      {sales.length===0
        ?<div style={{textAlign:'center',padding:'80px 24px',fontFamily:"'Playfair Display',serif",fontStyle:'italic',fontSize:18,color:'rgba(255,255,255,0.2)'}}>Ingen salg registrert denne uken.</div>
        :<div className="content">
          <Ticker sales={sales} week={lw.week}/>
          <div style={{height:28}}/>
          {trebleWinners.length>0&&<TrebleBanner name={trebleWinners[0].name}/>}
          {winners.length>0&&<WinnerCard winners={winners} ranked={ranked} weekSales={sales}/>}
          {mvps.length>0&&<MVPCard mvps={mvps}/>}
          {hatters.length>0&&<HatTrickCard hatters={hatters} weekSales={sales}/>}
          {bestDept&&<DeptCard result={bestDept}/>}
          <AllSales sales={sales}/>
          <div className="footer">
            <div className="footer-line"/>
            <div className="footer-txt">VCSO Selekt Cup 2026 · Mai – Juni</div>
          </div>
        </div>
      }
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
