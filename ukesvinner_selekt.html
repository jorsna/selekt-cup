<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Selekt Cup – Ukens vinner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09111e;--card:#0d1624;--b1:#1c2d42;--gold:#c9a84c;--gold2:#f0c96e;--txt:#e8f2ff;--muted:#5a7898}
body{background:var(--bg);font-family:'Barlow Condensed',sans-serif;color:var(--txt);
     min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

/* LOADING */
.spinner{width:36px;height:36px;border:3px solid var(--b1);border-top-color:var(--gold);
          border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;text-align:center}

/* WINNER CARD */
.winner-card{
  width:100%;max-width:420px;
  background:linear-gradient(160deg,#0f2014 0%,#0a1a0f 60%);
  border:1px solid rgba(201,168,76,.3);
  border-radius:12px;overflow:hidden;
  box-shadow:0 0 60px rgba(201,168,76,.15),0 20px 60px rgba(0,0,0,.6);
  animation:appear .5s ease
}
@keyframes appear{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.card-top{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,215,0,.03));
           border-bottom:2px solid rgba(255,215,0,.2);padding:14px 20px;text-align:center}
.card-paper{font-family:'Playfair Display',serif;font-size:13px;color:rgba(255,215,0,.7);letter-spacing:1px}
.card-title{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
             color:var(--muted);margin-top:2px}

.card-photo-wrap{padding:28px 0 0;display:flex;justify-content:center}
.card-photo{width:120px;height:120px;border-radius:50%;overflow:hidden;
             border:4px solid var(--gold);
             box-shadow:0 0 0 8px rgba(255,215,0,.1),0 0 40px rgba(255,215,0,.3)}
.card-photo img{width:100%;height:100%;object-fit:cover;filter:grayscale(100%)}
.card-photo-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
                font-size:40px;font-weight:900;color:var(--gold);background:rgba(255,215,0,.08)}

.card-crown{text-align:center;font-size:32px;margin:10px 0 0;animation:bounce 1s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-5px)}}

.card-name{font-family:'Playfair Display',serif;font-size:clamp(26px,7vw,36px);
            font-weight:900;color:var(--gold);text-align:center;padding:6px 20px 2px;line-height:1}
.card-avd{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
           color:var(--muted);text-align:center;margin-bottom:16px}

.card-stats{display:flex;border-top:1px solid rgba(255,215,0,.15);border-bottom:1px solid rgba(255,215,0,.15)}
.stat{flex:1;padding:14px 8px;text-align:center;border-right:1px solid rgba(255,215,0,.1)}
.stat:last-child{border-right:none}
.stat-n{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--gold);line-height:1}
.stat-l{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:3px}

.card-quote{padding:16px 20px;font-family:'Playfair Display',serif;font-size:14px;
             line-height:1.7;color:var(--muted);font-style:italic;text-align:center}
.card-quote::before{content:'\201C';color:rgba(255,215,0,.3);font-size:24px;line-height:0;vertical-align:-.4em}
.card-quote::after{content:'\201D';color:rgba(255,215,0,.3);font-size:24px;line-height:0;vertical-align:-.4em}

.card-bot{background:rgba(255,215,0,.05);padding:10px 20px;text-align:center;
           font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,215,0,.5)}

.card-week{font-size:11px;color:var(--muted);text-align:center;padding:10px 0 16px;letter-spacing:1px}

/* BUTTONS */
.btns{display:flex;gap:10px;margin-top:16px;width:100%;max-width:420px}
.btn{flex:1;padding:13px;border:none;border-radius:6px;font-family:inherit;font-size:12px;
      font-weight:900;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer}
.btn-gold{background:var(--gold);color:#000}
.btn-out{background:transparent;color:var(--gold);border:1px solid rgba(255,215,0,.4)}

/* ERROR */
.err{text-align:center;color:#ef4444;font-size:13px;padding:40px 20px}

/* NO SALES */
.no-winner{text-align:center;color:var(--muted);font-style:italic;font-size:13px;padding:40px 20px}
</style>
</head>

<div id="wrap">
  <div class="spinner"></div>
  <div class="load-txt">Henter ukens vinner...</div>
</div>

function wkNum(d) {
  var dt = new Date(d); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() + 3 - (dt.getDay()+6)%7);
  var w1 = new Date(dt.getFullYear(), 0, 4);
  return 1 + Math.round(((dt.getTime()-w1.getTime())/86400000-3+(w1.getDay()+6)%7)/7);
}

function sid(n) {
  return n.toLowerCase().replace(/\s+/g,'_')
    .replace(/æ/g,'ae').replace(/ø/g,'o').replace(/å/g,'aa')
    .replace(/[^a-z0-9_]/g,'');
}

function fn(n) { return n.split(' ')[0]; }
function rnd(a) { return a[Math.floor(Math.random()*a.length)]; }

function photoEl(id) {
  var ini = id.replace(/_/g,' ').split(' ').map(function(w){return w[0]?w[0].toUpperCase():''}).join('').slice(0,2);
  if (SELGER_PHOTOS && SELGER_PHOTOS[id])
    return '<img src="'+SELGER_PHOTOS[id]+'" style="width:100%;height:100%;object-fit:cover;filter:grayscale(100%)">';
  return '<div class="card-photo-ph">'+ini+'</div>';
}

function locLabel(loc) {
  var map = {ryen:'Ryen',fornebu:'Fornebu',lillestrom:'Lillestrøm',okern:'Økern'};

}

function getQuote(navn, salg, fin) {

  return rnd(quotes);
}

      +'<div class="card-photo">'+photoEl(wId)+'</div>'
    +'</div>'
    // CROWN
    +'<div class="card-crown">👑</div>'
    // NAME
    +'<div class="card-name">'+winner+'</div>'
    +'<div class="card-avd">'+wLoc+'</div>'
    // STATS
    +'<div class="card-stats">'
      +'<div class="stat"><div class="stat-n">'+wSalg+'</div><div class="stat-l">Salg</div></div>'
      +'<div class="stat"><div class="stat-n">'+wFin+'</div><div class="stat-l">Finansiert</div></div>'
      +(wHat>0?'<div class="stat"><div class="stat-n">'+wHat+'</div><div class="stat-l">Hat-trick</div></div>':'')
    +'</div>'
    // QUOTE
    +'<div class="card-quote">'+quote+'</div>'
    // WEEK
    +'<div class="card-week">'+weekLbl+'</div>'
    // BOTTOM
    +'<div class="card-bot">'+dateStr+'</div>'
  +'</div>';

  var btns = '<div class="btns">'
    +'<button class="btn btn-gold" onclick="window.print()">🖨️ Skriv ut</button>'
    +'<button class="btn btn-out" onclick="shareCard()">📤 Del</button>'
  +'</div>';

  document.getElementById('wrap').innerHTML = card + btns;
})
.catch(function(e){
  document.getElementById('wrap').innerHTML = '<div class="err">'+e.message+'</div>';
});

function shareCard() {
  if (navigator.share) {
    navigator.share({
      title: 'VCSO Selekt Cup – Ukens vinner!',
      url: window.location.href
    });
  } else {
    navigator.clipboard.writeText(window.location.href).then(function(){
      alert('Lenke kopiert!');
    });
  }
}
</script>
</body>
</html>
