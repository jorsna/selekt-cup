    .replace(/æ/g,'ae').replace(/ø/g,'o').replace(/å/g,'aa')

function isoWeek(d) {
  const u = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = u.getUTCDay() || 7;
  u.setUTCDate(u.getUTCDate() + 4 - day);
  const y1 = new Date(Date.UTC(u.getUTCFullYear(), 0, 1));
  return Math.ceil((((u - y1) / 86400000) + 1) / 7);
}

function weekDates(year, week) {
  const jan4 = new Date(Date.UTC(year, 0, 4));
  const w1s  = new Date(jan4);
  w1s.setUTCDate(jan4.getUTCDate() - ((jan4.getUTCDay() || 7) - 1));
  const s = new Date(w1s); s.setUTCDate(w1s.getUTCDate() + (week-1)*7);
  const e = new Date(s);   e.setUTCDate(s.getUTCDate() + 6); e.setUTCHours(23,59,59,999);
  return { start:s, end:e };
}

function getLastWeek() {
  const d = new Date(); d.setDate(d.getDate() - 7);
  return { year: d.getFullYear(), week: isoWeek(d) };
}

function rankSales(sales) {
  const m = {};
  sales.forEach(s => {
    if (!m[s.selger]) m[s.selger] = { salg:0, finansiert:0, loc:s.loc, firstTs: s.ts };
    m[s.selger].salg++;
    if (s.finansiert) m[s.selger].finansiert++;
    if (s.ts < m[s.selger].firstTs) m[s.selger].firstTs = s.ts;
  });
  return Object.entries(m)
    .map(([name,d]) => ({ name,...d, poeng:d.salg*3 }))
    .sort((a,b) => b.poeng-a.poeng || b.finansiert-a.finansiert || a.firstTs.localeCompare(b.firstTs));
}

function getWeekWinners(ranked) {
  if (!ranked.length) return [];
  return [ranked[0]];
}

function getBestDept(ws) {
  const deptSales = {};
  ws.forEach(s => {
    const loc = s.loc || '';
    if (!loc) return;
    deptSales[loc] = (deptSales[loc]||0) + 1;
  });
  if (Object.keys(deptSales).length === 0) return null;
  const max = Math.max(...Object.values(deptSales));
  const best = Object.keys(deptSales).filter(k => deptSales[k] === max);
  return { locs: best, count: max };
}

function getMVPs(ws) {
  const bd = {};
  ws.forEach(s => {
    const day = s.ts.slice(0,10);
    if (!bd[day]) bd[day]={};
    bd[day][s.selger] = (bd[day][s.selger]||0)+1;
  });
  const days = Object.keys(bd).sort();
  const mc = {};
  days.forEach(day => {
    const ds = bd[day], max = Math.max(...Object.values(ds));
    Object.entries(ds).forEach(([n,c]) => { if(c===max) mc[n]=(mc[n]||0)+1; });
  });
  if (!Object.keys(mc).length) return [];
  const sorted = Object.entries(mc).sort((a,b)=>b[1]-a[1]);
  const topCount = sorted[0][1];
  return sorted
    .filter(([,count]) => count === topCount)
    .map(([name, count]) => {
      const mvpDays = days.map(day => { const ds=bd[day],max=Math.max(...Object.values(ds)); return ds[name]===max&&max>0; });
      return { name, count, loc:ws.find(s=>s.selger===name)?.loc||"", days, mvpDays };
    });
}

function Avatar({ name, loc, size=48 }) {
  const init  = name.split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase();
  const id    = nameToId(name);
  const photo = SELGER_PHOTOS[id];
  return (
    <div style={{ width:size,height:size,borderRadius:"50%",overflow:"hidden",border:"2px solid "+dc(loc),flexShrink:0,background:DEPT[loc]?.bg||AD,display:"flex",alignItems:"center",justifyContent:"center" }}>
      {photo
        ? <img src={photo} style={{ width:"100%",height:"100%",objectFit:"cover",filter:"grayscale(100%)" }} />
        : <div style={{ fontFamily:"'Bebas Neue',cursive",fontSize:size*.36,color:dc(loc),letterSpacing:"0.05em" }}>{init}</div>
      }
    </div>
  );
}

}

}

function HatTrickCard({ hatters, weekSales }) {
  if (!hatters.length) return null;
  return (
    <Card top="linear-gradient(90deg,rgba(34,197,94,0.5),rgba(34,197,94,0.1))">
      <div style={{ fontSize:9,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",color:"rgba(255,255,255,0.28)",marginBottom:16 }}>
        ⚽ Hat-trick denne uken

      {hatters.map((h, idx) => {
        const days = {};
        weekSales.filter(s=>s.selger===h.name).forEach(s=>{
          const d=s.ts.slice(0,10); days[d]=(days[d]||0)+1;
        });
        const htDays = Object.entries(days).filter(([,c])=>c>=3).map(([d,c])=>({d,c}));
        return (
          <div key={h.name}>
            {idx > 0 && <div style={{ borderTop:"1px solid "+BR,margin:"14px 0" }} />}
            <div style={{ display:"flex",alignItems:"center",gap:14,marginBottom:12 }}>
              <Avatar name={h.name} loc={h.loc} size={48} />
              <div>
                <div style={{ fontFamily:"'Bebas Neue',cursive",fontSize:26,letterSpacing:"0.03em",lineHeight:1,color:"#fff" }}>{h.name} ⭐</div>
                <div style={{ fontSize:11,color:"#22c55e",fontWeight:600,marginTop:3 }}>{htDays.length} hat-trick-dag{htDays.length>1?"er":""}</div>
              </div>
            </div>
            {htDays.map(({d,c}) => (
              <div key={d} style={{ display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:"rgba(34,197,94,0.08)",borderRadius:8,marginBottom:6,fontSize:12,color:"rgba(255,255,255,0.6)" }}>
                <span style={{ color:"#22c55e",fontWeight:700 }}>{c} salg</span>
                <span>–</span>
                <span>{new Date(d).toLocaleDateString("no-NO",{weekday:"long",day:"numeric",month:"long"})}</span>
              </div>
            ))}
          </div>
        );
      })}
    </Card>
  );
}

function DeptCard({ result }) {
  if (!result) return null;
  return (
    <Card top="linear-gradient(90deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02))">
      <div style={{ fontSize:9,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",color:"rgba(255,255,255,0.28)",marginBottom:16 }}>
        🏟️ Beste forhandler denne uken
      </div>
      {result.locs.map((loc, i) => (
        <div key={loc} style={{ display:"flex",alignItems:"center",gap:14,marginBottom: i < result.locs.length-1 ? 12 : 0 }}>
          <div style={{ width:48,height:48,borderRadius:"50%",background:DEPT[loc]?.bg||AD,border:"2px solid "+dc(loc),display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Bebas Neue',cursive",fontSize:16,color:dc(loc),flexShrink:0 }}>
            {(DEPT[loc]?.label||loc).slice(0,2).toUpperCase()}
          </div>
          <div>
            <div style={{ fontFamily:"'Bebas Neue',cursive",fontSize:32,letterSpacing:"0.03em",lineHeight:1,color:dc(loc) }}>{DEPT[loc]?.label||loc}</div>
            <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2 }}>{result.count} salg denne uken</div>
          </div>
        </div>
      ))}
    </Card>
  );
}

function App() {
  const [sales, setSales] = useState(null);
  const [error, setError] = useState(null);
  const lw = getLastWeek();

  useEffect(() => {
    const { start, end } = weekDates(lw.year, lw.week);
    const from = start.toISOString();
    const to   = end.toISOString();
    fetch(SB_URL+"/rest/v1/selekt_sales?select=*&ts=gte."+from+"&ts=lte."+to+"&deleted=is.null&order=ts.asc", {
      headers: { apikey: SB_KEY, Authorization: "Bearer "+SB_KEY }
    })
      .then(r => r.ok ? r.json() : Promise.reject(r.statusText))
      .then(setSales)
      .catch(e => setError(String(e)));
  }, []);

  if (error) return (
    <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#ef4444",fontFamily:"DM Sans",padding:24 }}>
      Feil: {error}
    </div>
  );

  if (!sales) return (
    <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center" }}>
      <div className="spin" />
    </div>
  );

  const ranked   = rankSales(sales);
  const winners  = getWeekWinners(ranked);
  const mvps     = getMVPs(sales);
  const bestDept = getBestDept(sales);

  const htMap = {};
  sales.forEach(s => {
    const d = s.ts.slice(0,10);
    if (!htMap[s.selger]) htMap[s.selger] = {};
    htMap[s.selger][d] = (htMap[s.selger][d]||0)+1;
  });
  const hatters = Object.entries(htMap)
    .filter(([,days]) => Object.values(days).some(c=>c>=3))
    .map(([name]) => ({ name, loc: sales.find(s=>s.selger===name)?.loc||"" }));

  const mvpNames      = new Set(mvps.map(m=>m.name));
  const trebleWinners = winners.filter(w => mvpNames.has(w.name) && bestDept?.locs.includes(w.loc));
  const hasTreble     = trebleWinners.length > 0;

  const { start, end } = weekDates(lw.year, lw.week);
  const fmt = d => d.toLocaleDateString("no-NO",{day:"numeric",month:"long"});

  return (
    <div style={{ fontFamily:"'DM Sans',sans-serif",color:"#fff",background:BG,minHeight:"100vh",padding:"0 0 40px" }}>
      <div style={{ background:"linear-gradient(180deg,#061209 0%,#0a1a0f 100%)",borderBottom:"1px solid rgba(201,168,76,0.12)",padding:"28px 24px 24px",textAlign:"center",position:"relative" }}>
        <div style={{ fontSize:9,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"rgba(255,255,255,0.25)",marginBottom:8 }}>
          VCSO SELEKT CUP 2026
        </div>
        <div style={{ fontFamily:"'Bebas Neue',cursive",fontSize:"clamp(32px,8vw,56px)",letterSpacing:"0.04em",lineHeight:1,marginBottom:6,background:"linear-gradient(135deg,"+GOLD2+","+GOLD+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent" }}>
          Uke {lw.week} – Recap
        </div>
        <div style={{ fontSize:12,color:"rgba(255,255,255,0.3)" }}>
          {fmt(start)} – {fmt(end)}
        </div>
        {!sales.length && (
          <div style={{ marginTop:16,fontSize:13,color:"rgba(255,255,255,0.35)",fontStyle:"italic" }}>
            Ingen salg registrert denne uken.
          </div>
        )}
      </div>

      {sales.length > 0 && (
        <div style={{ maxWidth:480,margin:"0 auto",padding:"24px 16px 0" }}>
          {hasTreble && <TrebleBanner name={trebleWinners[0].name} />}
          {winners.length > 0 && <WinnerCard winners={winners} ranked={ranked} weekSales={sales} />}
          {mvps.length > 0    && <MVPCard mvps={mvps} />}
          {hatters.length > 0 && <HatTrickCard hatters={hatters} weekSales={sales} />}
          {bestDept           && <DeptCard result={bestDept} />}

          <div style={{ marginTop:8,padding:"16px 0 0" }}>
            <div style={{ fontSize:9,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",color:"rgba(255,255,255,0.22)",marginBottom:12 }}>
              📋 Alle {sales.length} salg denne uken
            </div>
            {sales.slice().sort((a,b)=>b.ts.localeCompare(a.ts)).map((s,i) => (
              <div key={i} style={{ display:"flex",alignItems:"center",gap:10,padding:"9px 14px",background:i%2===0?"rgba(255,255,255,0.025)":"transparent",borderRadius:8,marginBottom:2 }}>
                <div style={{ width:6,height:6,borderRadius:"50%",background:dc(s.loc),flexShrink:0 }} />
                <div style={{ flex:1,fontSize:13,color:"rgba(255,255,255,0.75)",fontWeight:500 }}>{s.selger}</div>
                <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)" }}>{s.modell}</div>
                {s.finansiert && <div style={{ fontSize:9,fontWeight:700,color:GOLD2,letterSpacing:"0.1em" }}>◆ FIN</div>}
                <div style={{ fontSize:11,color:"rgba(255,255,255,0.25)" }}>{s.ts.slice(5,10).replace("-",".")}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
