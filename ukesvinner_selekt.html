<style>
* { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }

body {
  background:#050e07;
  font-family:'Montserrat',sans-serif;
  color:#fff;
  overflow-x:hidden;
}

/* Animated background */
.bg-anim {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.bg-orb {
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.18;
  animation:orbFloat 12s ease-in-out infinite;
}
.bg-orb-1 { width:600px;height:600px;background:radial-gradient(circle,#c9a84c,transparent 70%);top:-200px;left:-150px;animation-delay:0s; }
.bg-orb-2 { width:500px;height:500px;background:radial-gradient(circle,#22c55e,transparent 70%);bottom:-100px;right:-100px;animation-delay:-4s; }
.bg-orb-3 { width:350px;height:350px;background:radial-gradient(circle,#e8001a,transparent 70%);top:40%;left:60%;animation-delay:-8s; }

/* Gold grid lines */
.grid-overlay {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background-image:
    linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
  background-size:60px 60px;
}

/* Grain texture */
.grain {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  opacity:0.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

@keyframes orbFloat {
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(30px,-40px) scale(1.05);}
  66%{transform:translate(-20px,20px) scale(0.95);}
}
@keyframes float { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-14px) rotate(2deg)} }
@keyframes shimmer { 0%{background-position:200% center;} 100%{background-position:-200% center;} }
@keyframes revealUp { from{opacity:0;transform:translateY(40px);} to{opacity:1;transform:translateY(0);} }
@keyframes revealScale { from{opacity:0;transform:scale(0.85);} to{opacity:1;transform:scale(1);} }
@keyframes scanline { 0%{transform:translateY(-100%);} 100%{transform:translateY(100vh);} }
@keyframes pulse { 0%,100%{opacity:0.6;} 50%{opacity:1;} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes crownBounce { 0%,100%{transform:translateY(0) rotate(-5deg) scale(1);} 40%{transform:translateY(-18px) rotate(5deg) scale(1.08);} }
@keyframes goldGlow {
  0%,100%{box-shadow: 0 0 20px rgba(201,168,76,0.2), 0 0 60px rgba(201,168,76,0.05);}
  50%{box-shadow: 0 0 40px rgba(201,168,76,0.4), 0 0 100px rgba(201,168,76,0.15);}
}
@keyframes borderRotate {
  0%{background-position:0% 50%;}
  100%{background-position:400% 50%;}
}
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
@keyframes ticker { 0%{transform:translateX(100vw);} 100%{transform:translateX(-100%);} }

.animate-reveal { animation:revealUp 0.8s cubic-bezier(.16,1,.3,1) both; }
.animate-reveal-2 { animation:revealUp 0.8s cubic-bezier(.16,1,.3,1) 0.15s both; }
.animate-reveal-3 { animation:revealUp 0.8s cubic-bezier(.16,1,.3,1) 0.3s both; }
.animate-reveal-4 { animation:revealUp 0.8s cubic-bezier(.16,1,.3,1) 0.45s both; }
.animate-scale { animation:revealScale 0.9s cubic-bezier(.16,1,.3,1) 0.1s both; }

.spin { width:32px;height:32px;border:2px solid rgba(201,168,76,0.15);border-top-color:rgba(201,168,76,0.8);border-radius:50%;animation:spin 0.9s linear infinite; }

/* Luxury card */
.luxury-card {
  position:relative;
  border-radius:24px;
  padding:2px;
  margin-bottom:20px;
  background:linear-gradient(135deg,rgba(201,168,76,0.5),rgba(201,168,76,0.05) 40%,rgba(201,168,76,0.05) 60%,rgba(201,168,76,0.3));

}
.luxury-card-inner {

  padding:32px 30px;
  position:relative;
  overflow:hidden;
}
.luxury-card-inner::before {

  position:absolute;
  inset:0;
  background:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(201,168,76,0.06),transparent 60%);

/* Winner hero card */

/* Gold text */
.gold-text {

  background-size:300% auto;

  -webkit-text-fill-color:transparent;

.gold-text-static {

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* Separator */
.gold-line {
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.4),transparent);
  margin:20px 0;
}

/* Stat box */
.stat-box {
  background:rgba(0,0,0,0.3);
  border:1px solid rgba(201,168,76,0.15);
  border-radius:16px;
  padding:18px 12px;
  text-align:center;
  position:relative;
  overflow:hidden;
  transition:border-color 0.3s;
}
.stat-box::before {
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.06),transparent 60%);
}
.stat-box:hover { border-color:rgba(201,168,76,0.4); }

/* Avatar ring */
.avatar-ring {
  padding:3px;
  border-radius:50%;
  background:linear-gradient(135deg,#c9a84c,#f0c96e,#8a6b1e,#c9a84c);
  background-size:300% 300%;
  animation:borderRotate 3s linear infinite;
  display:inline-block;
}

/* Rank badge */
.rank-row {
  display:flex;
  align-items:center;
  gap:14px;
  padding:12px 16px;
  border-radius:14px;
  margin-bottom:8px;
  background:rgba(0,0,0,0.2);
  border:1px solid rgba(201,168,76,0.07);
  transition:all 0.2s;
}
.rank-row:hover {
  background:rgba(201,168,76,0.05);
  border-color:rgba(201,168,76,0.2);
}

/* Ticker tape */
.ticker-wrap {
  overflow:hidden;
  white-space:nowrap;
  padding:10px 0;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.05),transparent);
  border-top:1px solid rgba(201,168,76,0.1);
  border-bottom:1px solid rgba(201,168,76,0.1);
}
.ticker {
  display:inline-block;
  animation:ticker 30s linear infinite;
  font-size:10px;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:rgba(201,168,76,0.5);
}

/* MVP day dots */
.mvp-day {
  flex:1;
  border-radius:10px;
  padding:8px 4px;
  text-align:center;
  transition:all 0.2s;
}

/* Scanline effect on load */
.scanline {
  position:fixed;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.6),transparent);
  z-index:999;
  animation:scanline 2s ease-out 0.2s forwards;
  pointer-events:none;
}

/* Section label */
.section-label {
  font-size:9px;
  font-weight:700;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:rgba(201,168,76,0.5);
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:10px;
}
.section-label::before,.section-label::after {
  content:'';
  flex:1;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.2));
}
.section-label::before { background:linear-gradient(90deg,rgba(201,168,76,0.2),transparent); }
</style>

function isoWeek(d) {
  const u = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = u.getUTCDay() || 7;
  u.setUTCDate(u.getUTCDate() + 4 - day);
  const y1 = new Date(Date.UTC(u.getUTCFullYear(), 0, 1));
  return Math.ceil((((u - y1) / 86400000) + 1) / 7);
}
function weekDates(year, week) {
  const jan4 = new Date(Date.UTC(year, 0, 4));
  const w1s  = new Date(jan4);
  w1s.setUTCDate(jan4.getUTCDate() - ((jan4.getUTCDay() || 7) - 1));
  const s = new Date(w1s); s.setUTCDate(w1s.getUTCDate() + (week-1)*7);
  const e = new Date(s);   e.setUTCDate(s.getUTCDate() + 6);
  // Norsk sommertid (CEST) = UTC+2. Mandag 00:00 Oslo = søndag 22:00 UTC forrige dag.
  // start = mandag 00:00 Oslo = UTC mandag 00:00 - 2t = søndag 22:00 UTC
  const startUTC = new Date(Date.UTC(s.getUTCFullYear(), s.getUTCMonth(), s.getUTCDate(), 0, 0, 0) - 2*60*60*1000);
  // end = søndag 23:59:59 Oslo = UTC søndag 21:59:59
  const endUTC   = new Date(Date.UTC(e.getUTCFullYear(), e.getUTCMonth(), e.getUTCDate(), 23, 59, 59, 999) - 2*60*60*1000);
  return { start: startUTC, end: endUTC };
}
function getDisplayWeek() {
  // Bruk norsk tid (Europe/Oslo) for å avgjøre hvilken uke som vises.
  // Uken låses 23:59 søndag norsk tid → vis alltid forrige fullførte uke
  // (dvs. trekk 7 dager fra "i dag norsk tid")
  const nowOslo = new Date(new Date().toLocaleString("en-US", { timeZone: "Europe/Oslo" }));
  const d = new Date(nowOslo);
  d.setDate(d.getDate() - 7);
  return { year: d.getFullYear(), week: isoWeek(d) };
}
function rankSales(sales) {
  const m = {};
  sales.forEach(s => {
    if (!m[s.selger]) m[s.selger] = { salg:0, finansiert:0, loc:s.loc, firstTs: s.ts };
    m[s.selger].salg++;
    if (s.finansiert) m[s.selger].finansiert++;
    if (s.ts < m[s.selger].firstTs) m[s.selger].firstTs = s.ts;
  });
  return Object.entries(m)
    .map(([name,d]) => ({ name,...d, poeng:d.salg*3 }))
    .sort((a,b) => b.poeng-a.poeng || b.finansiert-a.finansiert || a.firstTs.localeCompare(b.firstTs));
}
function getMVPs(ws) {
  const bd = {};
  ws.forEach(s => {
    const day = s.ts.slice(0,10);
    if (!bd[day]) bd[day]={};
    bd[day][s.selger] = (bd[day][s.selger]||0)+1;
  });
  const days = Object.keys(bd).sort();
  const mc = {};
  days.forEach(day => {
    const ds = bd[day], max = Math.max(...Object.values(ds));
    Object.entries(ds).forEach(([n,c]) => { if(c===max) mc[n]=(mc[n]||0)+1; });
  });
  if (!Object.keys(mc).length) return [];
  const sorted = Object.entries(mc).sort((a,b)=>b[1]-a[1]);
  const topCount = sorted[0][1];
  return sorted
    .filter(([,count]) => count === topCount)
    .map(([name, count]) => {
      const mvpDays = days.map(day => { const ds=bd[day],max=Math.max(...Object.values(ds)); return ds[name]===max&&max>0; });
      return { name, count, loc:ws.find(s=>s.selger===name)?.loc||"", days, mvpDays };
    });
}
function getBestDept(ws) {
  const ds = {};
  ws.forEach(s => { if(s.loc) ds[s.loc]=(ds[s.loc]||0)+1; });
  if (!Object.keys(ds).length) return null;
  const max = Math.max(...Object.values(ds));
  return { locs: Object.keys(ds).filter(k=>ds[k]===max), count: max };
}

}

          <div style={{display:"inline-flex",alignItems:"center",gap:8,background:DEPT[w.loc]?.bg||"rgba(201,168,76,0.1)",border:"1px solid "+deptColor+"44",borderRadius:30,padding:"5px 16px"}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:deptColor,boxShadow:"0 0 8px "+deptColor}} />
            <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:deptColor}}>{dl(w.loc)}</span>
          </div>
        </div>

        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:28}}>
          {[
            { v: w.salg,       l: "Salg",       icon:"📦" },
            { v: w.poeng,      l: "Poeng",      icon:"⚡" },
            { v: w.finansiert, l: "Finansiert", icon:"◆" },
          ].map(({v,l,icon}) => (
            <div className="stat-box" key={l}>
              <div style={{fontSize:10,marginBottom:6,opacity:0.5}}>{icon}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:42,fontWeight:700,lineHeight:1,color:GOLD2,marginBottom:4}}>{v}</div>
              <div style={{fontSize:8,fontWeight:600,letterSpacing:"0.2em",textTransform:"uppercase",color:"rgba(255,255,255,0.25)"}}>{l}</div>
            </div>
          ))}
        </div>

        {/* Rest of ranking */}
        {ranked.length > 1 && (
          <>
            <div className="section-label">Resten av toppen</div>
            <div style={{marginTop:14}}>
              {ranked.slice(1, 6).map((r,i) => (
                <div className="rank-row" key={r.name}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:"rgba(255,255,255,0.12)",width:28,textAlign:"center",flexShrink:0}}>
                    {i+2}
                  </div>
                  <Avatar name={r.name} loc={r.loc} size={36} />
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:500,color:"rgba(255,255,255,0.7)"}}>{r.name}</div>
                    <div style={{fontSize:9,color:dc(r.loc),fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",marginTop:2}}>{dl(r.loc)}</div>
                  </div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:dc(r.loc)}}>{r.poeng}</div>
                  <div style={{fontSize:8,color:"rgba(255,255,255,0.2)",marginLeft:2,alignSelf:"flex-end",paddingBottom:3}}>p</div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function MVPCard({ mvps }) {
  if (!mvps.length) return null;
  const isTied = mvps.length > 1;
  return (
    <div className="luxury-card animate-reveal-2">
      <div className="luxury-card-inner">
        <div className="section-label" style={{marginBottom:20}}>
          {isTied ? "👑 Delt flest MVP-dager" : "👑 Flest MVP-dager"}
        </div>
        {mvps.map((mvp, idx) => (
          <div key={mvp.name}>
            {idx > 0 && <div className="gold-line" />}
            <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:18}}>
              <Avatar name={mvp.name} loc={mvp.loc} size={52} />
              <div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontWeight:700,lineHeight:1,color:"#fff"}}>{mvp.name}</div>
                <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.15em",color:GOLD2,marginTop:5}}>
                  MVP {mvp.count} av {mvp.days.length} dag{mvp.days.length>1?"er":""}
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:6}}>
              {mvp.days.map((day,i) => (
                <div key={day} className="mvp-day" style={{
                  background:mvp.mvpDays[i]?"rgba(201,168,76,0.15)":"rgba(255,255,255,0.03)",
                  border:"1px solid "+(mvp.mvpDays[i]?"rgba(201,168,76,0.45)":"rgba(255,255,255,0.05)"),
                  boxShadow:mvp.mvpDays[i]?"0 0 12px rgba(201,168,76,0.15)":"none",
                }}>
                  <div style={{fontSize:8,fontWeight:700,letterSpacing:"0.1em",color:mvp.mvpDays[i]?GOLD2:"rgba(255,255,255,0.2)"}}>
                    {new Date(day).toLocaleDateString("no-NO",{weekday:"short"}).toUpperCase().slice(0,3)}
                  </div>
                  {mvp.mvpDays[i] && <div style={{fontSize:16,marginTop:4}}>👑</div>}
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function HatTrickCard({ hatters, weekSales }) {
  if (!hatters.length) return null;
  return (
    <div className="luxury-card animate-reveal-3">
      <div className="luxury-card-inner" style={{position:"relative"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:"linear-gradient(90deg,transparent,rgba(34,197,94,0.6),transparent)"}} />
        <div className="section-label" style={{marginBottom:20,color:"rgba(34,197,94,0.6)"}}>
          ⭐ Hat-trick denne uken
        </div>
        {hatters.map((h, idx) => {
          const days = {};
          weekSales.filter(s=>s.selger===h.name).forEach(s=>{
            const d=s.ts.slice(0,10); days[d]=(days[d]||0)+1;
          });
          const htDays = Object.entries(days).filter(([,c])=>c>=3).map(([d,c])=>({d,c}));
          return (
            <div key={h.name}>
              {idx > 0 && <div className="gold-line" />}
              <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:14}}>
                <Avatar name={h.name} loc={h.loc} size={48} />
                <div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,lineHeight:1,color:"#fff"}}>{h.name}</div>
                  <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.12em",color:"#22c55e",marginTop:5}}>{htDays.length} hat-trick-dag{htDays.length>1?"er":""}</div>
                </div>
              </div>
              {htDays.map(({d,c}) => (
                <div key={d} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"rgba(34,197,94,0.06)",border:"1px solid rgba(34,197,94,0.15)",borderRadius:12,marginBottom:8,fontSize:12}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 8px #22c55e",flexShrink:0}} />
                  <span style={{color:"#22c55e",fontWeight:700,fontSize:13}}>{c} salg</span>
                  <span style={{color:"rgba(255,255,255,0.25)"}}>·</span>
                  <span style={{color:"rgba(255,255,255,0.5)"}}>{new Date(d).toLocaleDateString("no-NO",{weekday:"long",day:"numeric",month:"long"})}</span>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function DeptCard({ result }) {
  if (!result) return null;
  return (
    <div className="luxury-card animate-reveal-4">
      <div className="luxury-card-inner">
        <div className="section-label" style={{marginBottom:20}}>🏟️ Beste forhandler denne uken</div>
        {result.locs.map((loc, i) => {
          const col = dc(loc);
          return (
            <div key={loc} style={{display:"flex",alignItems:"center",gap:16,marginBottom: i < result.locs.length-1 ? 16 : 0}}>
              <div style={{
                width:56,height:56,borderRadius:"50%",
                background:DEPT[loc]?.bg||"rgba(201,168,76,0.1)",
                border:"2px solid "+col,
                display:"flex",alignItems:"center",justifyContent:"center",
                boxShadow:"0 0 20px "+col+"33",
                fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:col,
                flexShrink:0,
              }}>
                {(DEPT[loc]?.label||loc).slice(0,2).toUpperCase()}
              </div>
              <div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,fontWeight:700,lineHeight:1,color:col,textShadow:"0 0 20px "+col+"55"}}>{DEPT[loc]?.label||loc}</div>
                <div style={{fontSize:10,fontWeight:500,letterSpacing:"0.12em",color:"rgba(255,255,255,0.3)",marginTop:4}}>{result.count} salg denne uken</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AllSales({ sales }) {
  return (
    <div className="luxury-card" style={{marginTop:8}}>
      <div className="luxury-card-inner">
        <div className="section-label" style={{marginBottom:18}}>
          📋 Alle {sales.length} salg denne uken
        </div>
        {sales.slice().sort((a,b)=>b.ts.localeCompare(a.ts)).map((s,i) => (
          <div key={i} style={{
            display:"flex",alignItems:"center",gap:12,
            padding:"10px 14px",
            background:i%2===0?"rgba(255,255,255,0.02)":"transparent",
            borderRadius:10,marginBottom:3,
            borderLeft:"2px solid "+dc(s.loc)+"55",
          }}>
            <div style={{width:6,height:6,borderRadius:"50%",background:dc(s.loc),boxShadow:"0 0 6px "+dc(s.loc),flexShrink:0}} />
            <div style={{flex:1,fontSize:13,fontWeight:500,color:"rgba(255,255,255,0.72)"}}>{s.selger}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",fontStyle:"italic"}}>{s.modell}</div>
            {s.finansiert && <div style={{fontSize:8,fontWeight:700,color:GOLD2,letterSpacing:"0.15em"}}>◆ FIN</div>}
            <div style={{fontSize:10,color:"rgba(255,255,255,0.2)",fontWeight:500}}>{s.ts.slice(5,10).replace("-",".")}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [sales, setSales] = useState(null);
  const [error, setError] = useState(null);
  const lw = getDisplayWeek();

  useEffect(() => {
    const { start, end } = weekDates(lw.year, lw.week);
    fetch(SB_URL+"/rest/v1/selekt_sales?select=*&ts=gte."+start.toISOString()+"&ts=lte."+end.toISOString()+"&deleted=is.null&order=ts.asc", {
      headers: { apikey: SB_KEY, Authorization: "Bearer "+SB_KEY }
    })
      .then(r => r.ok ? r.json() : Promise.reject(r.statusText))
      .then(setSales)
      .catch(e => setError(String(e)));
  }, []);

  if (error) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#ef4444",fontFamily:"Montserrat",padding:24,textAlign:"center",fontSize:13}}>
      <div>
        <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
        Feil ved lasting: {error}
      </div>
    </div>
  );

  if (!sales) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div className="spin" />
      <div style={{fontSize:9,letterSpacing:"0.3em",textTransform:"uppercase",color:"rgba(201,168,76,0.4)"}}>Laster inn data...</div>
    </div>
  );

  const ranked   = rankSales(sales);
  const winners  = ranked.length ? [ranked[0]] : [];
  const mvps     = getMVPs(sales);
  const bestDept = getBestDept(sales);
  const htMap    = {};
  sales.forEach(s => {
    const d = s.ts.slice(0,10);
    if (!htMap[s.selger]) htMap[s.selger] = {};
    htMap[s.selger][d] = (htMap[s.selger][d]||0)+1;
  });
  const hatters = Object.entries(htMap)
    .filter(([,days]) => Object.values(days).some(c=>c>=3))
    .map(([name]) => ({ name, loc: sales.find(s=>s.selger===name)?.loc||"" }));

  const mvpNames      = new Set(mvps.map(m=>m.name));
  const trebleWinners = winners.filter(w => mvpNames.has(w.name) && bestDept?.locs.includes(w.loc));
  const hasTreble     = trebleWinners.length > 0;

  const { start, end } = weekDates(lw.year, lw.week);
  const fmt = d => d.toLocaleDateString("no-NO",{day:"numeric",month:"long"});

  return (
    <div style={{minHeight:"100vh",color:"#fff"}}>
      {/* Header */}
      <div style={{
        padding:"48px 24px 36px",
        textAlign:"center",
        position:"relative",
        borderBottom:"1px solid rgba(201,168,76,0.08)",
        background:"linear-gradient(180deg,rgba(201,168,76,0.04) 0%,transparent 100%)",
      }}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:"1px",background:"linear-gradient(90deg,transparent,rgba(201,168,76,0.5),transparent)"}} />

        <div style={{fontSize:8,fontWeight:700,letterSpacing:"0.5em",textTransform:"uppercase",color:"rgba(201,168,76,0.45)",marginBottom:16}}>
          VCSO SELEKT CUP 2026
        </div>

        <div className="gold-text" style={{
          fontFamily:"'Cormorant Garamond',serif",
          fontSize:"clamp(40px,10vw,72px)",
          fontWeight:700,lineHeight:1,
          letterSpacing:"0.03em",
          marginBottom:10,
        }}>
          Uke {lw.week}
        </div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"clamp(16px,4vw,24px)",fontWeight:300,fontStyle:"italic",color:"rgba(255,255,255,0.3)",letterSpacing:"0.05em",marginBottom:20}}>
          Ukesrecap
        </div>

        <div style={{display:"inline-flex",alignItems:"center",gap:10,background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.15)",borderRadius:40,padding:"7px 20px"}}>
          <div style={{width:5,height:5,borderRadius:"50%",background:GOLD,animation:"pulse 2s ease-in-out infinite"}} />
          <span style={{fontSize:10,fontWeight:500,letterSpacing:"0.12em",color:"rgba(201,168,76,0.7)"}}>
            {fmt(start)} – {fmt(end)}
          </span>
        </div>

        {!sales.length && (
          <div style={{marginTop:24,fontSize:13,color:"rgba(255,255,255,0.25)",fontStyle:"italic",fontFamily:"'Cormorant Garamond',serif"}}>
            Ingen salg registrert denne uken.
          </div>
        )}
      </div>

      {sales.length > 0 && (
        <>
          <TickerContent sales={sales} week={lw.week} />
          <div style={{maxWidth:500,margin:"0 auto",padding:"28px 16px 0"}}>
            {hasTreble && <TrebleBanner name={trebleWinners[0].name} />}
            {winners.length > 0 && <WinnerCard winners={winners} ranked={ranked} weekSales={sales} />}
            {mvps.length > 0    && <MVPCard mvps={mvps} />}
            {hatters.length > 0 && <HatTrickCard hatters={hatters} weekSales={sales} />}
            {bestDept           && <DeptCard result={bestDept} />}
            <AllSales sales={sales} />

            {/* Footer */}
            <div style={{textAlign:"center",padding:"32px 0 8px"}}>
              <div style={{height:"1px",background:"linear-gradient(90deg,transparent,rgba(201,168,76,0.2),transparent)",marginBottom:24}} />
              <div style={{fontSize:8,letterSpacing:"0.4em",textTransform:"uppercase",color:"rgba(201,168,76,0.25)"}}>
                VCSO Selekt Cup 2026 &nbsp;·&nbsp; Mai – Juni
              </div>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
